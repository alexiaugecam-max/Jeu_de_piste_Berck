<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Berck Aventure — UGECAM La Molière</title>
<meta name="description" content="Jeu de piste accessible depuis l'UGECAM Centre La Molière, Boulevard de Paris, Berck-sur-Mer"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ============================================================
   TOKENS — WCAG 2.1 AA  |  100 % daltonien-safe
   Remplacement vert/rouge (problématique) → bleu/orange
   ============================================================
   Vérifications WebAIM Contrast Checker :
   --c-ok  #004D99 sur #DDE8F5 → 9.6:1  ✓ AA + AAA
   --c-ko  #944200 sur #FCEEE0 → 6.4:1  ✓ AA
   --c-p   #005CA8 sur blanc   → 7.2:1  ✓ AA + AAA
   Distincts pour protanopie, deutéranopie, tritanopie ✓
   ============================================================ */
:root{
  --c-p:      #005CA8;  /* Bleu principal   7.2:1 ✓ */
  --c-pd:     #003F75;  /* Bleu foncé      11.4:1 ✓ */
  --c-pl:     #E8F1F9;  /* Bleu pâle (fond) */
  --c-t:      #1A1A1A;  /* Texte principal  17.9:1 ✓ */
  --c-ts:     #3D3D3D;  /* Texte secondaire 10.3:1 ✓ */
  --c-tm:     #595959;  /* Texte atténué     7.0:1 ✓ */
  --c-bg:     #F4F6F9;
  --c-card:   #FFFFFF;
  --c-bo:     #767676;  /* Bordure 4.5:1 ✓ */
  --c-bol:    #BDBDBD;
  /* ✅ Correct → BLEU (remplace vert, sûr pour daltoniens) */
  --c-ok:     #004D99;  /* Bleu foncé 9.6:1 ✓ */
  --c-ok-bg:  #DDE8F5;
  /* ❌ Incorrect → ORANGE (remplace rouge, sûr pour daltoniens) */
  --c-ko:     #944200;  /* Orange foncé 6.4:1 ✓ */
  --c-ko-bg:  #FCEEE0;
  /* Ambre texte foncé */
  --c-am:     #5B4000;  /* 8.7:1 ✓ */
  --c-am-bg:  #FFF3CD;
  --tap: 48px;
  --r-sm:6px; --r-md:12px; --r-lg:18px; --r-xl:24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
* {-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  background:var(--c-bg);color:var(--c-t);line-height:1.6;min-height:100svh}
body.dys{font-family:'OpenDyslexic','Comic Sans MS',cursive!important;
  letter-spacing:.05em;word-spacing:.1em;line-height:1.85}
body.hc{--c-p:#0000CC;--c-pd:#000088;--c-pl:#FFF;--c-t:#000;
  --c-card:#FFF;--c-bg:#FFF;--c-bo:#000;--c-bol:#444;
  --c-ok:#003388;--c-ok-bg:#CCEEFF;--c-ko:#7A3000;--c-ko-bg:#FFEDD9;
  --c-am:#3D2800;--c-am-bg:#FFF0B3}

/* ---- SKIP LINK ---- */
.skip{position:absolute;top:-120px;left:1rem;background:var(--c-p);color:#fff;
  padding:.75rem 1.25rem;border-radius:var(--r-md);font-weight:700;z-index:10000;
  text-decoration:none;transition:top .1s}
.skip:focus{top:1rem}

/* ---- FOCUS (ne jamais supprimer — WCAG 2.4.7) ---- */
:focus-visible{outline:3px solid var(--c-p);outline-offset:3px;border-radius:4px}
:focus:not(:focus-visible){outline:none}

/* ---- BARRE A11Y ---- */
.a11y{background:var(--c-card);border-bottom:2px solid var(--c-bol);
  padding:.5rem clamp(.75rem,3vw,1.5rem);display:flex;gap:.5rem;flex-wrap:wrap;
  align-items:center;position:sticky;top:0;z-index:1000}
.a11y__lbl{font-size:.8125rem;font-weight:700;color:var(--c-tm);
  text-transform:uppercase;letter-spacing:.05em;margin-right:.25rem}
.a11y-btn{min-height:var(--tap);min-width:var(--tap);touch-action:manipulation;padding:.4rem .875rem;
  background:var(--c-bg);border:2px solid var(--c-bo);border-radius:var(--r-sm);
  font-size:.875rem;font-weight:700;color:var(--c-t);cursor:pointer;
  font-family:inherit;display:flex;align-items:center;gap:.35rem;transition:background .15s}
.a11y-btn:hover{background:var(--c-pl)}
.a11y-btn[aria-pressed=true]{background:var(--c-p);color:#fff;border-color:var(--c-pd)}

/* ---- LAYOUT ---- */
.app{max-width:720px;margin:0 auto;min-height:100svh;background:var(--c-bg)}

/* ---- CARTE LEAFLET ---- */
#map{height:clamp(230px,40vw,320px);width:100%;border-bottom:3px solid var(--c-bol);touch-action:pan-x pan-y;}
.mk{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.9375rem;font-weight:900;
  border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,.4)}
.mk-done {background:#004D99;color:#fff}
.mk-fut  {background:#595959;color:#fff;opacity:.75}
.mk-cur  {background:var(--r-col,#005CA8);color:#fff;animation:mpulse 1.8s ease-in-out infinite}
@keyframes mpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* ---- SCROLL ---- */
.scroll{padding:clamp(.75rem,3vw,1.25rem);scroll-behavior:smooth;padding-bottom:calc(clamp(.75rem,3vw,1.25rem) + env(safe-area-inset-bottom,0px))}

/* ---- CARD ---- */
.card{background:var(--c-card);border-radius:var(--r-lg);
  padding:clamp(1rem,3vw,1.25rem);border:1px solid var(--c-bol);margin-bottom:1rem}

/* ---- BOUTONS ---- */
.btn{display:flex;align-items:center;justify-content:center;gap:.5rem;touch-action:manipulation;user-select:none;-webkit-user-select:none;
  min-height:var(--tap);width:100%;padding:.75rem 1.25rem;
  background:var(--c-p);color:#fff;border:2px solid transparent;
  border-radius:var(--r-md);font-size:clamp(1rem,2.5vw,1.0625rem);font-weight:700;
  cursor:pointer;font-family:inherit;text-align:center;
  transition:background .15s,transform .1s}
.btn:hover{background:var(--c-pd)}
.btn:active{transform:scale(.98)}
.btn:focus{outline:none}
.btn-sec{background:var(--c-card);color:var(--c-pd);border-color:var(--c-p)}
.btn-sec:hover{background:var(--c-pl)}
.btn-ghost{background:transparent;color:var(--c-t);border-color:var(--c-bo);
  width:auto;padding:.5rem .875rem;font-size:.875rem}
.btn-ghost:hover{background:var(--c-bg)}

/* ---- OPTIONS QCM ---- */
.opt{display:flex;align-items:flex-start;gap:.75rem;min-height:var(--tap);touch-action:manipulation;width:100%;
  padding:.875rem 1rem;background:var(--c-card);border:2px solid var(--c-bo);
  border-radius:var(--r-md);font-size:clamp(.9375rem,2.5vw,1rem);font-weight:600;
  text-align:left;color:var(--c-t);cursor:pointer;font-family:inherit;
  margin-bottom:.625rem;transition:background .1s,border-color .1s,transform .1s;
  line-height:1.5}
.opt:hover:not(:disabled){background:var(--c-pl);border-color:var(--c-p)}
.opt:active:not(:disabled){transform:scale(.99)}
/* ✅/❌ : couleur + icône + texte (jamais couleur seule — WCAG 1.4.1) */
.ok   {background:var(--c-ok-bg);border-color:var(--c-ok);color:var(--c-ok)}
.ko   {background:var(--c-ko-bg);border-color:var(--c-ko);color:var(--c-ko)}
.neut {background:var(--c-bg);border-color:var(--c-bol);color:var(--c-tm)}
.opt__n{flex-shrink:0;width:28px;height:28px;border-radius:50%;
  background:var(--c-bg);border:2px solid var(--c-bol);
  display:flex;align-items:center;justify-content:center;
  font-size:.8125rem;font-weight:900;margin-top:1px}
.ok .opt__n{background:var(--c-ok);color:#fff;border-color:var(--c-ok)}
.ko .opt__n{background:var(--c-ko);color:#fff;border-color:var(--c-ko)}

/* ---- PROGRESSION ---- */
.prog{margin-bottom:.875rem}
.prog__row{display:flex;justify-content:space-between;font-size:.875rem;
  font-weight:700;color:var(--c-ts);margin-bottom:.375rem}
.prog__track{height:10px;background:var(--c-bol);border-radius:5px;overflow:hidden}
.prog__fill{height:100%;border-radius:5px;transition:width .4s ease}

/* ---- POINTS ÉTAPE ---- */
.dotrow{display:flex;gap:6px;align-items:center;justify-content:center;
  margin-bottom:.75rem;flex-wrap:wrap}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid transparent;flex-shrink:0}
.dot-done{background:#004D99;border-color:#004D99}
.dot-cur{background:var(--c-p);border-color:var(--c-pd);box-shadow:0 0 0 3px rgba(0,92,168,.25)}
.dot-fut{background:transparent;border-color:var(--c-bol)}

/* ---- VISUEL ÉTAPE ---- */
.stepimg{width:100%;height:clamp(155px,28vw,205px);border-radius:var(--r-md);
  overflow:hidden;margin-bottom:1rem;display:flex;align-items:center;
  justify-content:center;position:relative;border:2px solid var(--c-bol)}
.stepimg img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.stepimg__fb{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:.5rem;padding:1rem;width:100%;height:100%;
  position:relative;z-index:1}
.stepimg__em{font-size:clamp(3rem,10vw,3.75rem);line-height:1}
.stepimg__cap{font-size:.8125rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.55)}

/* ---- BOÎTES INFO ---- */
.hint{background:var(--c-pl);border:2px solid var(--c-p);border-radius:var(--r-md);
  padding:.875rem 1rem;margin-bottom:1rem;font-size:.9375rem;
  color:var(--c-pd);font-weight:700;display:flex;gap:.625rem;align-items:flex-start}
.info-card{background:#E3F4FD;border:2px solid #005B6E;border-radius:var(--r-md);padding:1rem;margin-top:.875rem;font-size:.9375rem;color:#003848}
.info-card__title{font-weight:900;font-size:1rem;margin-bottom:.625rem;display:flex;align-items:center;gap:.5rem}
.info-card__item{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.5rem;font-size:.9375rem;line-height:1.55}
.info-card__item:last-child{margin-bottom:0}
.anec{background:var(--c-am-bg);border:2px solid var(--c-am);
  border-radius:var(--r-md);padding:.875rem 1rem;margin-top:.875rem;
  font-size:.9375rem;color:var(--c-am);line-height:1.65}
.fbbox{border-radius:var(--r-md);padding:1rem;margin-top:.875rem;
  font-size:.9375rem;line-height:1.65;border:2px solid}
.fbbox-ok{background:var(--c-ok-bg);border-color:var(--c-ok);color:var(--c-ok)}
.fbbox-ko{background:var(--c-ko-bg);border-color:var(--c-ko);color:var(--c-ko)}
.fbbox__h{font-weight:900;font-size:1.0625rem;margin-bottom:.5rem;
  display:flex;align-items:center;gap:.5rem}
/* Légende daltonisme */
.legend{display:flex;gap:.625rem;font-size:.8125rem;font-weight:700;margin-bottom:.75rem;
  flex-wrap:wrap}
.legend__item{display:flex;align-items:center;gap:.375rem;padding:.3rem .75rem;
  border-radius:100px;border:2px solid}
.legend__ok{background:var(--c-ok-bg);color:var(--c-ok);border-color:var(--c-ok)}
.legend__ko{background:var(--c-ko-bg);color:var(--c-ko);border-color:var(--c-ko)}

/* ---- HERO ACCUEIL ---- */
.hero{min-height:100svh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:clamp(1.5rem,5vw,3rem) clamp(1rem,5vw,2rem);
  text-align:center;color:#fff}
.hero__em{font-size:clamp(4rem,15vw,5.5rem);margin-bottom:1rem;display:block}
.hero__h1{font-size:clamp(1.625rem,5vw,2.375rem);font-weight:900;margin-bottom:.5rem}
.hero__sub{font-size:clamp(.9375rem,2.5vw,1.0625rem);opacity:.9;
  margin-bottom:1.75rem;max-width:38ch;line-height:1.55}
.hero__cta{min-height:var(--tap);touch-action:manipulation;background:#fff;border:3px solid #fff;
  border-radius:var(--r-md);font-size:clamp(1rem,2.5vw,1.125rem);font-weight:900;
  padding:.875rem 2rem;cursor:pointer;font-family:inherit;
  transition:background .15s,transform .1s;width:100%;max-width:440px;
  display:flex;align-items:center;justify-content:center;gap:.5rem}
.hero__cta:active{transform:scale(.98)}

/* ---- SÉLECTION PARCOURS ---- */
.rcard{background:var(--c-card);border-radius:var(--r-xl);margin-bottom:1rem;touch-action:manipulation;
  box-shadow:0 3px 14px rgba(0,0,0,.09);overflow:hidden;cursor:pointer;
  transition:transform .15s;border:1px solid var(--c-bol)}
.rcard:active{transform:scale(.98)}
.rcard__head{padding:1.125rem 1.25rem .75rem;display:flex;align-items:center;gap:.875rem}
.rcard__body{padding:0 1.25rem 1.25rem}
.mission{background:var(--c-am-bg);border:2px dashed var(--c-am);
  border-radius:var(--r-md);padding:.75rem 1rem;color:var(--c-am);
  font-size:.9375rem;font-weight:700;margin-top:.625rem}
.badge-pill{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .75rem;
  border-radius:100px;font-size:.8125rem;font-weight:700;border:2px solid;
  margin:.25rem .25rem 0 0}

/* ---- HEADER JEU ---- */
.sechead{display:flex;align-items:center;justify-content:space-between;
  gap:.5rem;margin-bottom:.875rem;flex-wrap:wrap}
.scbadge{background:var(--c-pl);color:var(--c-pd);border:2px solid var(--c-p);
  border-radius:100px;padding:.3rem .875rem;font-size:.875rem;font-weight:900;
  white-space:nowrap}

/* ---- DIPLÔME FINAL ---- */
.diploma{background:var(--c-card);border:3px solid var(--c-p);
  border-radius:var(--r-xl);padding:clamp(1.25rem,4vw,2rem);
  text-align:center;margin-bottom:1rem}
.diploma__ic{font-size:clamp(3.5rem,12vw,5rem);display:block;
  animation:bounce .9s ease 2;margin-bottom:.5rem}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-20px)}70%{transform:translateY(-8px)}}
.diploma__h{font-size:clamp(1.25rem,4vw,1.625rem);font-weight:900;
  color:var(--c-pd);margin-bottom:.25rem}
.diploma__sub{font-size:.9375rem;color:var(--c-tm);margin-bottom:1.25rem}
.diploma__seal{background:var(--c-pl);border:2px solid var(--c-p);
  border-radius:var(--r-md);padding:1rem;font-size:1rem;
  color:var(--c-pd);font-weight:700;line-height:1.7}

/* ---- RÉCAP FINAL ---- */
.rcap{display:flex;align-items:center;gap:.75rem;padding:.75rem .875rem;
  border-radius:var(--r-sm);margin-bottom:.5rem;font-size:.9375rem;
  font-weight:600;border:1px solid}
.rcap-ok{background:var(--c-ok-bg);border-color:var(--c-ok);color:var(--c-ok)}
.rcap-ko{background:var(--c-ko-bg);border-color:var(--c-ko);color:var(--c-ko)}

/* ---- RESPONSIVE ---- */
@media(min-width:600px){.btn2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}}
@supports(padding:max(0px)){.a11y{padding-left:max(clamp(.75rem,3vw,1.5rem),env(safe-area-inset-left));padding-right:max(clamp(.75rem,3vw,1.5rem),env(safe-area-inset-right))}}
</style>
</head>
<body>
<a href="#main" class="skip">Aller au contenu principal</a>

<nav class="a11y" aria-label="Options d'accessibilité">
  <span class="a11y__lbl" aria-hidden="true">Accessibilité&nbsp;:</span>
  <button class="a11y-btn" id="btn-dys" aria-pressed="false" onclick="toggleDys()" title="Police OpenDyslexic">Aa Dys</button>
  <button class="a11y-btn" id="btn-hc"  aria-pressed="false" onclick="toggleHC()"  title="Contraste élevé">◐ Contraste</button>
  <button class="a11y-btn" id="btn-big" aria-pressed="false" onclick="toggleBig()" title="Texte plus grand">T↑ Grand</button>
  <button class="a11y-btn" onclick="doSpeak()"                   title="Synthèse vocale">🔊 Lire</button>
  <button class="a11y-btn" onclick="speechSynthesis.cancel()"    title="Arrêter la lecture">⏹ Silence</button>
</nav>

<main id="main"><div class="app" id="app"></div></main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ============================================================  A11Y  */
let dys=false,hc=false,big=false,spk='';
function toggleDys(){dys=!dys;document.body.classList.toggle('dys',dys);
  document.getElementById('btn-dys').setAttribute('aria-pressed',dys);
  if(dys&&!document.getElementById('odf')){
    const l=document.createElement('link');l.id='odf';l.rel='stylesheet';
    l.href='https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/opendyslexic.css';
    document.head.appendChild(l);}}
function toggleHC(){hc=!hc;document.body.classList.toggle('hc',hc);
  document.getElementById('btn-hc').setAttribute('aria-pressed',hc);}
function toggleBig(){big=!big;document.documentElement.style.fontSize=big?'20px':'16px';
  document.getElementById('btn-big').setAttribute('aria-pressed',big);}
function doSpeak(){speechSynthesis.cancel();if(!spk)return;
  const u=new SpeechSynthesisUtterance(spk);u.lang='fr-FR';u.rate=.9;speechSynthesis.speak(u);}

/* ============================================================  CARTE  */
let MAP=null;
function killMap(){if(MAP){MAP.remove();MAP=null;}}

function buildMap(steps,cur,col){
  document.documentElement.style.setProperty('--r-col',col);
  setTimeout(()=>{
    const el=document.getElementById('map');if(!el)return;
    MAP=L.map('map',{zoomControl:true,attributionControl:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(MAP);
    const cc=steps.map(s=>s.c);
    L.polyline(cc,{color:'#9E9E9E',weight:5,dashArray:'10,7',opacity:.55}).addTo(MAP);
    if(cur>0) L.polyline(cc.slice(0,cur+1),{color:'#004D99',weight:5,opacity:.85}).addTo(MAP);
    steps.forEach((s,i)=>{
      const done=i<cur,active=i===cur;
      const cls=done?'mk-done':active?'mk-cur':'mk-fut';
      const lbl=done?'✓':String(i+1);
      const aria=done?`Étape ${i+1} terminée`:active?`Étape ${i+1} en cours`:`Étape ${i+1} à venir`;
      const icon=L.divIcon({
        html:`<div class="mk ${cls}" role="img" aria-label="${aria}" style="${active?'background:'+col:''}">${lbl}</div>`,
        className:'',iconSize:[40,40],iconAnchor:[20,20],popupAnchor:[0,-24]});
      const mk=L.marker(s.c,{icon}).addTo(MAP);
      mk.bindPopup(`<b style="font-size:14px">${active?'📍 ':''}${s.nm}</b>`,{maxWidth:200});
      if(active){mk.openPopup();mk.on('click',()=>{if(G.ph==='riddle')set({ph:'question'});});}
    });
    MAP.fitBounds(L.latLngBounds(cc).pad(.12));
    setTimeout(()=>{if(MAP)MAP.setView(cc[cur],16,{animate:true});},400);
  },220);
}

/* ============================================================  DONNÉES
   Départ commun : UGECAM Centre La Molière, Bd de Paris, Berck-sur-Mer
   GPS référence Office de Tourisme : 50.405087 / 1.56027 (B7 sur le plan)
   ============================================================ */
const ROUTES=[
  {id:1,ic:'⚓',col:'#005CA8',cd:'#003F75',cl:'#E8F1F9',nm:'Les Pêcheurs',ds:'La vie des pêcheurs de Berck',acc:'♿ Accessible en fauteuil',dist:'2 km',time:'1 heure',mission:'Trouve et photographie un symbole de la mer sur un bâtiment (ancre, poisson ou bateau).',
  steps:[
    {nm:'Départ — Centre La Molière',c:[50.4042,1.5758],vi:{bg:'linear-gradient(135deg,#003F75,#005CA8)',em:'🏥',cap:'Centre La Molière'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Tu es devant le Centre La Molière. Marche vers l\'est pour aller à Berck-Ville. C\'est le vieux quartier des pêcheurs.',q:'Quelle est la phrase (la devise) de Berck-sur-Mer ?',op:['«\u00a0Notre mer\u00a0»','«\u00a0Par les eaux et le sable\u00a0»','«\u00a0Fort et Fidèle\u00a0»'],ok:1,wy:'La devise de Berck est «\u00a0Undis et Arena\u00a0». Cela veut dire «\u00a0Par les eaux et le sable\u00a0». Berck est une ville de la mer et du sable !',anec:'🐟 Le blason de Berck montre une ancre avec 2 poissons. Un maquereau et un hareng. Ces 2 poissons étaient très pêchés à Berck.'},
    {nm:'L\'Église Saint-Jean-Baptiste',c:[50.4092,1.5930],vi:{bg:'linear-gradient(135deg,#005CA8,#003F75)',em:'⛪',cap:'Église St-Jean-Baptiste'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Voici l\'Église Saint-Jean-Baptiste. Elle est très ancienne. Elle a été construite entre le 13e et le 17e siècle. Regarde la tour du clocher.',q:'À quoi servait la tour du clocher la nuit ?',op:['On y sonnait les cloches toute la nuit','On y allumait un grand feu pour guider les bateaux','On y gardait le poisson au frais'],ok:1,wy:'Chaque soir, un gardien allumait un grand feu au sommet de la tour. Ce feu s\'appelait le «\u00a0Foïer\u00a0». Les pêcheurs le voyaient de loin. Cela les guidait pour rentrer chez eux.',anec:'🌩️ anec:'Le 21 octobre 1780, la foudre a tué le gardien au sommet de la tour. Il a été enterré le lendemain.',info:{titre:'⛪ L'Église Saint-Jean-Baptiste — À retenir',items:['📅 Construite entre le 13e et le 17e siècle. Elle mesure 43 mètres de long.','🔦 Le clocher servait de « Foïer » : un feu allumé la nuit pour guider les pêcheurs en mer.','🏰 La tour a aussi servi de tour de guet pendant la guerre de Cent Ans (1337–1453).','🗿 À l\'intérieur, 16 sculptures (culs-de-lampe) représentent des scènes de la vie berquoise.','🌊 Le Foïer est célébré chaque année avec la fête du « Feu d\'Or » fin juin.'],bg:'#E8F1F9',bo:'#005CA8'}},
    {nm:'L\'Hôtel de Ville',c:[50.4100,1.5942],vi:{bg:'linear-gradient(135deg,#003F75,#005CA8)',em:'🏛️',cap:'Hôtel de Ville 1893'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Voici la Mairie de Berck. Elle a été construite en 1893. Regarde les pierres bleues en bas et la tour avec l\'horloge en haut.',q:'Qu\'est-ce qu\'il y avait sur cette place avant les bombardements de 1944 ?',op:['Un grand jardin fleuri','Un marché couvert pour vendre le poisson','Une grande fontaine'],ok:1,wy:'Sur la place, il y avait un marché aux poissons. Il avait 10 tables en pierre. Chaque jour, les pêcheurs vendaient leur poisson frais ici. Il a été détruit en 1944.',anec:'🎨 anec:'La grande salle de la Mairie a un plafond peint par un artiste nommé Jan Lavezzari. Il a peint des scènes de la vie des pêcheurs en 1908 et 1909.',info:{titre:'🏛️ L'Hôtel de Ville — À retenir',items:['📅 Construit en 1893 par l\'architecte Clovis Normand. Inauguré le 12 juillet 1893.','🧱 Pierre bleue en bas, pierre blanche pour les ornements. Tour-horloge à lanternon.','🐟 La place avait une halle aux poissons depuis 1865 : 10 tables en pierre, 12 colonnes en fonte.','🎨 La salle d\'honneur est décorée par Jan Lavezzari (1908–1909). Classée Monument Historique depuis 1989.','🖼️ Ces peintures montrent les départs de pêche, les ramasseuses d\'épaves, la construction de bateaux.'],bg:'#E8F1F9',bo:'#005CA8'}},
    {nm:'Les Maisons de Pêcheurs',c:[50.4110,1.5958],vi:{bg:'linear-gradient(135deg,#005CA8,#004070)',em:'🏠',cap:'Maisons de pêcheurs'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Regarde ces petites maisons basses en briques. Ce sont les maisons des anciens pêcheurs. On les protège car elles font partie de l\'histoire de Berck.',q:'Comment transportait-on le poisson vers Paris avant le train ?',op:['Par bateau jusqu\'à Paris','À cheval dans des charrettes appelées «\u00a0ballons\u00a0»','Par char à voile sur la plage'],ok:1,wy:'Les pêcheurs utilisaient des charrettes tirées par des chevaux. On les appelait des «\u00a0ballons\u00a0». Leurs conducteurs s\'appelaient «\u00a0chasse-marées\u00a0». Ils allaient très vite pour garder le poisson frais.',anec:'🐴 Ces chevaux étaient des chevaux boulonnais. C\'est une race du nord de la France. Ils étaient grands, forts, et parfaits pour ce travail.'},
    {nm:'Le Musée Opale Sud',c:[50.4085,1.5895],vi:{bg:'linear-gradient(135deg,#003F75,#005CA8)',em:'🖼️',cap:'Musée Opale Sud'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Le Musée Opale Sud est au 60 rue de l\'Impératrice. C\'est l\'ancienne gendarmerie de Berck. On y expose des tableaux et des objets sur l\'histoire de Berck.',q:'Combien de peintres sont venus travailler à Berck au 19e siècle ?',op:['Environ 20 peintres','Environ 10 peintres','Plus de 200 peintres'],ok:2,wy:'Plus de 200 peintres sont venus à Berck pour peindre. Ils aimaient la lumière de la mer. On appelle ce groupe l\'«\u00a0École de Berck\u00a0». On peut voir leurs tableaux au musée.',anec:'🌈 La mer de Berck change de couleur tout le temps. Elle ressemble à une pierre précieuse appelée opale. C\'est pour ça que la côte s\'appelle la Côte d\'Opale.'}
  ]},
  {id:2,ic:'🎭',col:'#8B4A00',cd:'#5C3000',cl:'#FAEEE0',nm:'La Plage Balnéaire',ds:'Les bâtiments du bord de mer',acc:'♿ Accessible en fauteuil',dist:'2,2 km',time:'1 heure',mission:'Prends en photo un beau détail sur une façade : fenêtre arrondie, sculpture ou dessin en brique.',
  steps:[
    {nm:'Départ — Centre La Molière',c:[50.4042,1.5758],vi:{bg:'linear-gradient(135deg,#5C3000,#8B4A00)',em:'🚂',cap:'Vers la plage'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Depuis le Centre La Molière, marche vers l\'ouest. Va jusqu\'à l\'avenue du Général de Gaulle. Tu vas découvrir le quartier de la plage.',q:'Comment les gens venaient-ils à Berck avant le train ?',op:['En bateau depuis Boulogne','À pied depuis Paris','En diligence tirée par des chevaux'],ok:2,wy:'Avant le train, les gens venaient en diligence. C\'est une grande voiture tirée par des chevaux. Ensuite il y a eu un tramway à chevaux. Le train est arrivé en 1891.',anec:'🚃 Le tramway à chevaux reliait la mairie à la plage de 1897 à 1901. Les habitants l\'appelaient le «\u00a0Tortillard\u00a0» car il faisait des petits virages.',info:{
  titre:'🏡 L\'Architecture Balnéaire — Ce que tu vas voir',
  items:[
    '🏠 Les «\u00a0Chalets Berckois\u00a0» : maisons en plan L avec bow-window, cartouche au-dessus de la porte et jeu de couleurs en briques. Construites pour les vacanciers.',
    '🎀 Leurs toits ont parfois des lambrequins (dentelles de bois décoratives) ou des croupes débordantes.',
    '🏰 Les «\u00a0Villas\u00a0» : grandes maisons bourgeoises isolées dans leur jardin, surtout dans le quartier de Lhomel.',
    '🏗️ Les premiers immeubles de Berck sont apparus dans la rue Carnot dès les années 1880, style néo-flamand avec bow-windows.',
    '🎭 Rue Carnot (n°14-16) et rue du Dr Cazin (n°13-15), 4 chalets jumelés portent les noms de : Pierrot, Colombine, Arlequin et Pierrette !',
    '🌿 Le Grand Trianon (20 rue Marius Chambon) mêle architecture néo-classique et éléments rococo.',
    '👀 Astuce : lève les yeux sur les façades ! Beaucoup de décors d\'origine sont cachés sous des couches de peinture.',
  ],bg:'#FAEEE0',bo:'#5C3000'
}},
    {nm:'Le Casino — Ancienne Gare',c:[50.4025,1.5650],vi:{bg:'linear-gradient(135deg,#8B4A00,#B35A00)',em:'🏗️',cap:'Ancienne Gare 1891'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Ce grand bâtiment est aujourd\'hui un casino. Mais avant, c\'était la gare de Berck ! Elle a été construite en 1891.',q:'En quelle année la gare de Berck a-t-elle été construite ?',op:['En 1891','En 1855','En 1930'],ok:0,wy:'La gare a été construite en 1891. Elle reliait Berck à Paris. Beaucoup de touristes venaient à Berck. En 1909, la gare a été agrandie. Plus tard, elle est devenue un casino.',anec:'🏥 Pendant la guerre 1914-1918, la gare est devenue un hôpital. On soignait les soldats blessés. C\'était l\'hôpital numéro 49.'},
    {nm:'Le Kursaal',c:[50.4035,1.5665],vi:{bg:'linear-gradient(135deg,#5C3000,#8B4A00)',em:'🎪',cap:'Kursaal 1904'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Regarde le Kursaal ! Il a été construit en 1904. Il a des briques rouges et beiges mélangées. Ce style vient des pays arabes. C\'est très original !',q:'Qu\'est-il arrivé au Kursaal pendant la guerre 1914 ?',op:['Il est devenu un hôpital pour les soldats blessés','Il est resté un lieu de fêtes','Il a été détruit'],ok:0,wy:'En 1914, le Kursaal est devenu un hôpital. On y soignait les soldats blessés du front. C\'était l\'hôpital numéro 49. Après la guerre, il est redevenu un lieu de spectacles.',anec:'🧱 anec:'Le même architecte a construit le Kursaal de Berck et l\'Hôtel Westminster au Touquet. Il s\'appelait Auguste Bluysen.',info:{titre:'🎪 Le Kursaal — À retenir',items:['📅 Construit en 1904. Architecte : Auguste Bluysen (aussi auteur du casino du Touquet).','🧱 Style néo-mauresque : briques rouges et beiges en assises horizontales (les « rouge-barres »).','🎭 Plusieurs pavillons juxtaposés avec toits-terrasses à balustrade. Un pavillon néo-chinois était ajouté dans le jardin.','🏥 En 1914, transformé en hôpital auxiliaire n°49 pour soigner les blessés du front.','💡 Les « rouge-barres » se retrouvent aussi sur l\'église Notre-Dame-des-Sables toute proche.'],bg:'#FAEEE0',bo:'#5C3000'}},
    {nm:'L\'Église Notre-Dame-des-Sables',c:[50.4055,1.5700],vi:{bg:'linear-gradient(135deg,#8B4A00,#5C3000)',em:'⛪',cap:'Notre-Dame-des-Sables 1887'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Voici l\'église Notre-Dame-des-Sables. Elle a été construite entre 1882 et 1887. Elle mesure 35 mètres de long. Elle a de beaux vitraux colorés.',q:'Pourquoi a-t-on construit cette église près de la plage ?',op:['Pour avoir une plus grande église','Parce que l\'église Saint-Jean-Baptiste était trop loin de la plage','Pour faire plaisir à l\'architecte'],ok:1,wy:'L\'autre église était trop loin du bord de mer. Les malades et les touristes ne pouvaient pas y aller facilement. Alors on a construit cette nouvelle église plus près de la plage.',anec:'🔨 anec:'Le toit de l\'église utilise une technique anglaise du 15e siècle. Elle s\'appelle « Hammer beam » qui veut dire « poutre martelée ». Le toit monte jusqu\'à 13 mètres de haut.',info:{titre:'⛪ Notre-Dame-des-Sables — À retenir',items:['📅 Construction : 1882–1887. Inauguration le 22 août 1887. Décret du président Jules Grévy.','📐 35 m de long, 14 m de large, charpente à 13 m de hauteur. 3 nefs, chevet plat.','🎨 Vitraux du maître-verrier Levêque (Beauvais). Peintures murales de Lesieur.','🧱 Mêmes briques « rouge-barres » que sur le Kursaal. Architecte : Clovis Normand.','🔨 Charpente « Hammer beam » en pitchpin : technique gothique anglaise du 15e siècle.','🖌️ Façades restaurées fin 2022 : l\'église a retrouvé son aspect d\'origine.'],bg:'#FAEEE0',bo:'#5C3000'}},
    {nm:'La sculpture «\u00a0Marianne Toute Seule\u00a0»',c:[50.4058,1.5603],vi:{bg:'linear-gradient(135deg,#B35A00,#8B4A00)',em:'🗿',cap:'Marianne Toute Seule'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Sur l\'Esplanade Parmentier, cherche la sculpture «\u00a0Marianne Toute Seule\u00a0». Elle montre 2 femmes et un petit garçon. Elle représente les soignants qui s\'occupent des malades.',q:'Qui a créé cette sculpture en 1892 ?',op:['Auguste Rodin','Marie Cazin-Guillet, belle-sœur du médecin Henri Cazin','Jan Lavezzari, peintre berckois'],ok:1,wy:'Marie Cazin-Guillet était une artiste. Son beau-frère était le docteur Henri Cazin. Elle a créé cette sculpture pour dire merci aux médecins et soignants de Berck.',anec:'🛡️ anec:'En 1939, la sculpture a été cachée. Les Allemands prenaient les bronzes pour faire des armes. Après la guerre, la sculpture a été remise à sa place.',info:{titre:'🗿 Monument Cazin-Perrochaud — À retenir',items:['👩‍🎨 Réalisé en 1892 par Marie Cazin-Guillet, sculptrice et belle-sœur du Dr Henri Cazin.','📍 Placé d\'abord dans les jardins du Kursaal, puis déplacé à l\'Esplanade Parmentier.','🏛️ Le bas-relief original du Dr Cazin auscultant des enfants est conservé à l\'Hôtel de Ville.','👩 La sculpture honore Marie-Anne Brillard, surnommée « Marianne Toute Seule », pionnière des soins à Berck.','🛡️ Protégé de la fonte allemande en 1939, il a été remonté après la guerre.'],bg:'#FAEEE0',bo:'#5C3000'}}
  ]},
  {id:3,ic:'🏥',col:'#5B2090',cd:'#3D126B',cl:'#EDE5F5',nm:'L\'Histoire Hospitalière',ds:'Les hôpitaux et les médecins de Berck',acc:'♿ Accessible en fauteuil',dist:'2,5 km',time:'1 heure',mission:'Trouve le nom d\'un médecin écrit sur un bâtiment ou un panneau du parcours.',
  steps:[
    {nm:'Départ — Centre La Molière',c:[50.4042,1.5758],vi:{bg:'linear-gradient(135deg,#3D126B,#5B2090)',em:'🌊',cap:'Berck, ville médicale'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Berck est une ville médicale connue dans le monde entier. Tout a commencé en 1854 grâce à l\'air de la mer. Et grâce à 2 femmes courageuses.',q:'En 1854, qui a eu l\'idée d\'emmener des enfants malades se baigner sur la plage de Berck ?',op:['Un médecin parisien en vacances','Marie-Anne Duhamel, qui les emmenait en brouette deux fois par jour','Une infirmière de l\'hôpital'],ok:1,wy:'En 1854, Marie-Anne Duhamel emmenait des enfants malades à la plage dans une brouette. Elle les baignait 2 fois par jour. Les enfants guérissaient ! La nouvelle est arrivée jusqu\'à Paris.',anec:'🐴 Une autre femme a continué ce travail. Elle s\'appelait Marie-Anne Brillard. Elle utilisait une voiture tirée par un âne. Elle soignait 8 enfants. Ils ont tous guéri.'},
    {nm:'L\'Institut Calot',c:[50.4048,1.5618],vi:{bg:'linear-gradient(135deg,#5B2090,#7B32B0)',em:'🏛️',cap:'Institut Calot'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Voici l\'Institut Calot. Il a été construit entre 1901 et 1906. Le Docteur Calot était un chirurgien très célèbre. Son hôpital pouvait accueillir 600 malades.',q:'Quel genre de patients très célèbres venait se faire soigner chez le Docteur Calot ?',op:['Des sportifs champions du monde','Des reines et des duchesses d\'Europe','Des artistes peintres'],ok:1,wy:'Le Docteur Calot était si connu que des personnes très importantes venaient à Berck. La reine Nathalie de Serbie et une duchesse de Russie ont été soignées ici. Il a reçu la Légion d\'Honneur.',anec:'📚 Le Docteur Calot a écrit des livres sur la médecine des os. Il est né en 1861. Il est mort en 1944. C\'est grâce à lui que Berck est devenu si connu.'},
    {nm:'L\'Hôpital Maritime',c:[50.4048,1.5618],vi:{bg:'linear-gradient(135deg,#3D126B,#5B2090)',em:'🏨',cap:'Hôpital Maritime 1869'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'L\'Hôpital Maritime a été ouvert le 18 juillet 1869. L\'Impératrice Eugénie est venue pour l\'inauguration. Au départ, il soignait uniquement des enfants malades des os.',q:'Quel est le premier nom de l\'Hôpital Maritime en 1869 ?',op:['Hôpital de la Côte d\'Opale','Hôpital Napoléon','Hôpital des Sables'],ok:1,wy:'En 1869, l\'hôpital s\'appelait «\u00a0Hôpital Napoléon\u00a0». Après la chute de Napoléon III, il a changé de nom plusieurs fois. En 1961, il a pris le nom «\u00a0Hôpital Maritime de Berck-sur-Mer\u00a0».',anec:'📈 En 1910, l\'hôpital a été agrandi. Il pouvait accueillir 1\u00a0000 malades. C\'est énorme pour l\'époque !'},
    {nm:'Le Monument des Internes',c:[50.4060,1.5625],vi:{bg:'linear-gradient(135deg,#7B32B0,#5B2090)',em:'🗿',cap:'Monument des Internes'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Ce monument raconte une histoire triste. En 1907, 2 médecins sont allés chasser des canards dans la Baie d\'Authie. La marée est montée très vite. Ils se sont noyés. Ce monument les honore.',q:'Pourquoi les 2 médecins se sont-ils noyés en 1907 ?',op:['Leur bateau a coulé','La marée est montée très vite par temps de brouillard','Ils ne savaient pas nager'],ok:1,wy:'Les 2 médecins chassaient par temps de brouillard. Ils n\'ont pas vu la marée monter. La mer est revenue très vite. Ils ont été noyés. La marée à Berck peut être très dangereuse.',anec:'🔧 anec:'Ce monument a été construit en 1913. Les Allemands l\'ont abîmé pendant la guerre. La ville l\'a reconstruit complètement en 2019.',info:{titre:'🗿 Monument des Internes — À retenir',items:['📅 Érigé en 1913 par le Dr Victor Ménard et tous les internes des hôpitaux de Paris.','😢 Il honore les Drs Charles Hubert et Gaston Chastagnol, noyés par la marée en 1907.','⚠️ Cela rappelle que les marées de Berck sont dangereuses : bâches et courants forts.','💣 Détruit en 1942 par les Allemands. La ville l\'a entièrement reconstruit en 2019.','🌊 Depuis 1866, la SNSM veille sur le littoral berckois. Appelle le 196 en cas d\'urgence en mer.'],bg:'#EDE5F5',bo:'#3D126B'}},
    {nm:'Le Phare de Berck',c:[50.3990,1.5490],vi:{bg:'linear-gradient(135deg,#5B2090,#3D126B)',em:'🔦',cap:'Phare de Berck'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Le phare actuel a été construit en 1949. Il mesure 40 mètres. Il a des rayures rouges et blanches. Il s\'allume tout seul depuis 1996. C\'est un Monument Historique depuis 2010.',q:'Pourquoi a-t-on construit un phare plus haut en 1868 ?',op:['L\'ancien était trop vieux','Un petit hôpital construit devant lui cachait sa lumière','La mer avait emporté l\'ancien'],ok:1,wy:'En 1861, un petit hôpital a été construit juste devant le phare. Il cachait la lumière. Les bateaux ne voyaient plus bien. Alors on a fait une tour plus haute pour que la lumière passe au-dessus.',anec:'🏠 anec:'L\'ancienne maison du gardien est devenue la Maison du Patrimoine. On peut voir comment vivaient les pêcheurs. C\'est gratuit ! Téléphone : 03 21 09 44 04.',info:{titre:'🔦 Le Phare de Berck — À retenir',items:['📅 1er phare : 1836 (11 m). 2e phare : 1868 (25 m). Phare actuel : reconstruit en 1949 (40 m).','🏥 En 1861, un petit hôpital construit devant le phare cachait sa lumière. On a dû le rehausser.','⚡ Électrifié en 1951. Automatisé en 1996. Rayures rouges et blanches.','🏛️ Le phare et son mur sont classés Monuments Historiques depuis le 30 décembre 2010.','🏠 Maison du Patrimoine (ancienne maison du gardien) : entrée gratuite. Tél. 03 21 09 44 04.','⛔ L\'intérieur de la tour n\'est pas accessible au public.'],bg:'#EDE5F5',bo:'#3D126B'}}
  ]},
  {id:4,ic:'🪁',col:'#005B6E',cd:'#003848',cl:'#DDF0F5',nm:'Sports et Records',ds:'Char à voile, cerfs-volants et champions',acc:'⚠️ Sable, partiellement accessible',dist:'2,4 km',time:'1 heure',mission:'Compte le nombre de cerfs-volants ou de chars à voile que tu vois pendant le parcours.',
  steps:[
    {nm:'Départ — Centre La Molière',c:[50.4042,1.5758],vi:{bg:'linear-gradient(135deg,#003848,#005B6E)',em:'🏅',cap:'Départ vers la plage'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Depuis le Centre La Molière, marche vers la plage. Berck est une ville de champions ! Des records du monde ont été battus ici.',q:'Quelle est la première course de char à voile organisée à Berck en 1912 ?',op:['La Coupe de France de char à voile','La première course d\'aéroplages','Les championnats du monde'],ok:1,wy:'En 1912, la toute première course de char à voile de France a eu lieu à Berck. Les chars s\'appelaient «\u00a0aéroplages\u00a0». C\'est Louis Blériot qui avait inventé ce nom.',anec:'✈️ Louis Blériot est le premier homme à avoir traversé la Manche en avion en 1909. Il aimait aussi Berck. Il y fabriquait ses chars à voile.'},
    {nm:'La Grande Plage',c:[50.4092,1.5625],vi:{bg:'linear-gradient(135deg,#005B6E,#0277A0)',em:'🏖️',cap:'Grande Plage'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Berck_sur_mer.jpg/640px-Berck_sur_mer.jpg',rd:'Tu es sur la Grande Plage de Berck. Regarde le ciel. Des cerfs-volants géants volent souvent ici. En 1891, une première mondiale a eu lieu sur cette plage.',q:'Quelle première mondiale a eu lieu ici en 1891 ?',op:['La première course de char à voile','La première photo prise depuis un cerf-volant en l\'air','Le premier vol en avion'],ok:1,wy:'En 1891, Émile Wenz a attaché un appareil photo à un cerf-volant. Le cerf-volant a monté en l\'air. L\'appareil a pris la toute première photo aérienne de l\'histoire ! C\'était ici, à Berck.',anec:'🪂 En 1904, Gabriel Voisin testait des planeurs sur les dunes de Berck. Ces essais l\'ont aidé à inventer ses premiers avions.'},
    {nm:'Zone de Char à Voile',c:[50.4110,1.5615],vi:{bg:'linear-gradient(135deg,#003848,#007B8A)',em:'💨',cap:'Record 151 km/h'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Land_yacht_racing.jpg/640px-Land_yacht_racing.jpg',rd:'Voici la zone de char à voile. Ces véhicules ont 3 roues et une grande voile. Le vent les pousse très vite. Un record du monde a été battu ici en 1991.',q:'Quelle vitesse a atteint Bertrand Lambert à Berck en 1991 ?',op:['98 km/h','151,55 km/h','200 km/h'],ok:1,wy:'En 1991, Bertrand Lambert a roulé à 151,55 km/h sur le sable de Berck. C\'est un record du monde de vitesse sur sable en char à voile. Ce record tient toujours.',anec:'🌍 Le record du monde absolu est de 222,40 km/h. Il a été battu en 2022 par un Néo-Zélandais nommé Glenn Ashby. Mais lui roulait sur une surface dure, pas sur le sable.',info:{

    '⛵ Le tout premier club de char à voile de France : le Sporting Club Berckois, créé à Berck.',
    '⏱️ Depuis 50 ans, les « 6h de Berck » rassemblent des équipes de toute l\'Europe sur cette plage.'
  ]
},
    {nm:'Le Festival des Cerfs-Volants',c:[50.4128,1.5603],vi:{bg:'linear-gradient(135deg,#005B6E,#003848)',em:'🎑',cap:'Festival depuis 1987'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Chaque printemps, le ciel de Berck se remplit de cerfs-volants géants. Il y a des animaux, des personnages, des formes inventées. Ce festival s\'appelle le RICV.',q:'Depuis quelle année Berck organise-t-il ce grand festival de cerfs-volants ?',op:['Depuis 1987','Depuis 1960','Depuis 2005'],ok:0,wy:'Le festival existe depuis 1987. Il s\'appelle les «\u00a0Rencontres Internationales de Cerfs-Volants\u00a0». Plus de 500\u00a0000 personnes viennent le voir chaque année.',anec:'🏁 Depuis 50 ans, une grande course de chars à voile a lieu à Berck. Elle s\'appelle les «\u00a06 heures de Berck\u00a0». Des équipes viennent de toute l\'Europe.,info:{

    {nm:'Le Bois Magnier',c:[50.4060,1.5185],vi:{bg:'linear-gradient(135deg,#007B8A,#005B6E)',em:'🌲',cap:'Bois Magnier'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Ammophila_arenaria_kust.jpg/640px-Ammophila_arenaria_kust.jpg',rd:'Termine au Bois Magnier. C\'est un bois en pleine ville. Il a un terrain de Disc Golf. Ce sport se joue avec des disques volants. C\'est amusant et accessible à tous !',q:'Comment gagne-t-on au Disc Golf ?',op:['En lançant le disque le plus loin','En atteignant les paniers avec le moins de lancers','En rattrapant le disque en l\'air'],ok:1,wy:'On lance un disque vers un panier en métal. Celui qui arrive au panier avec le moins de lancers gagne. C\'est comme le golf mais avec un disque. Tout le monde peut jouer !',anec:'🐿️ Le Bois Magnier est aussi un refuge pour les animaux. Des écureuils, des hérissons et des chauves-souris y vivent. De vieux chênes centenaires y poussent encore.'}
  ]},
  {id:5,ic:'🎭',col:'#7A3800',cd:'#4A2000',cl:'#FAE8D5',nm:'Fêtes et Traditions',ds:'Les fêtes de Berck et le patrimoine',acc:'♿ Accessible en fauteuil',dist:'2 km',time:'1 heure',mission:'Trouve une chapelle, un calvaire ou une petite statue religieuse pendant le parcours.',
  steps:[
    {nm:'Départ — Centre La Molière',c:[50.4042,1.5758],vi:{bg:'linear-gradient(135deg,#4A2000,#7A3800)',em:'🎉',cap:'Traditions berquoises'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Berck a des fêtes très anciennes. Elles existent depuis des centaines d\'années. Ce parcours te fait découvrir ces traditions.',q:'Que fête le «\u00a0Feu d\'Or\u00a0» chaque fin juin à Berck ?',op:['L\'arrivée de l\'été','L\'ancien feu allumé pour guider les marins en mer','La victoire des pêcheurs dans une bataille'],ok:1,wy:'Il y a longtemps, on allumait un grand feu au sommet de l\'église. Ce feu s\'appelait le «\u00a0Foïer\u00a0». Il guidait les bateaux des pêcheurs pour rentrer. La fête du «\u00a0Feu d\'Or\u00a0» rappelle cette tradition.',anec:'🐟 En novembre, il y a la Fête du Hareng. Les gens mangent des harengs grillés ou marinés. Le hareng était le poisson le plus pêché à Berck au Moyen-Âge.'},
    {nm:'Le Calvaire des Marins',c:[50.4010,1.5572],vi:{bg:'linear-gradient(135deg,#7A3800,#9A5000)',em:'⛵',cap:'Calvaire des Marins'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Le Calvaire des Marins est sur la promenade Debeyre. Il mesure 9 mètres de haut. Il a été construit en 1851. Détruit pendant la guerre, la ville l\'a reconstruit en 1999.',q:'En 1907, le Calvaire des Marins a failli être détruit. Qu\'est-ce qui s\'est passé ?',op:['Une tempête a failli l\'emporter','L\'incendie du Grand-Hôtel à côté a failli le brûler','Un bateau l\'a percuté'],ok:1,wy:'En 1907, un grand hôtel à côté a pris feu. Des gens courageux ont sauvé le calvaire. L\'une d\'elles s\'appelait Léonie Duplais. Elle tenait un restaurant pour les pauvres à Berck.',anec:'⛪ anec:'À Berck, il y a beaucoup de calvaires et de petites statues dans les rues. Les familles de pêcheurs les avaient mis là pour honorer les pêcheurs morts en mer.',info:{titre:'⛵ Le Calvaire des Marins — À retenir',items:['📅 Érigé en 1851 par la Marine, sur la place de l\'Entonnoir. Il mesure 9 mètres de haut.','🔥 Sauvé de l\'incendie du Grand-Hôtel en 1907 grâce à Léonie Duplais et un comité de soutien.','💣 Détruit pendant la Seconde Guerre Mondiale. Reconstruit par la ville en 1999.','⛪ La Bénédiction de la mer a lieu chaque année à la mi-août : messe, procession, bénédiction des bateaux.','🙏 Des dizaines de calvaires, chapelles et statues jalonnent Berck, érigés par les familles de pêcheurs.'],bg:'#FAE8D5',bo:'#4A2000'}},
    {nm:'Le Cottage des Dunes',c:[50.4115,1.5968],vi:{bg:'linear-gradient(135deg,#4A2000,#7A3800)',em:'🏰',cap:'Cottage des Dunes'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Le Cottage des Dunes est dans le quartier de Lhomel. Avant, c\'était un casino nommé «\u00a0Casino des Lapins\u00a0». Il a été construit en 1883.',q:'Pourquoi ce casino s\'appelait «\u00a0Casino des Lapins\u00a0» ?',op:['On y organisait des courses de lapins','Il appartenait à un monsieur Lapin','Il était dans les garennes, là où vivaient les lapins'],ok:2,wy:'Le casino était dans les garennes. Les garennes sont des terrains où vivent les lapins sauvages. Les gens ont donc appelé cet endroit «\u00a0Casino des Lapins\u00a0». Simple comme bonjour !',anec:'🎭 anec:'Dans la rue Carnot, il y a 4 chalets avec des noms amusants : Pierrot, Colombine, Arlequin et Pierrette. Ce sont des personnages du théâtre populaire italien.',info:{titre:'🏰 Le Cottage des Dunes — À retenir',items:['📅 Construit en 1883 sous le nom « Casino des Lapins » (situé dans les anciennes garennes).','🏨 Transformé en Grand Hôtel en 1913 par M. Vaudry, puis en Cottage des Dunes.','🏥 En 1914, hôpital auxiliaire n°44. Après la guerre, maison de pension pour enfants malades.','🏗️ Agrandi en 1924 : plan en « U » avec 3 bâtiments de 4 étages. Fronton central avec le nom.','🏛️ Aujourd\'hui, il abrite un hébergement collectif et des services municipaux de la ville.',
    '🏡 À proximité : la Villa Normande, construite fin 19e siècle comme pension de famille. Agrandie en 1907, elle pouvait accueillir 200 lits. Aujourd\'hui maison de repos.',
    '🎭 La Villa Normande est devenue hôpital militaire n°45 en 1914 puis cédée à la Fondation Franco-Américaine en 1945.'],bg:'#FAE8D5',bo:'#4A2000'}},
    {nm:'Le Musée Opale Sud',c:[50.4085,1.5895],vi:{bg:'linear-gradient(135deg,#9A5000,#7A3800)',em:'🎨',cap:'Musée Opale Sud'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Le Musée Opale Sud est rue de l\'Impératrice. Il garde les tableaux des peintres de Berck. Il a aussi des objets de la vie des pêcheurs : filets, paniers, vêtements.',q:'Un peintre a décoré une chapelle pour dire merci aux soignants de Berck. Qui est-ce ?',op:['Jan Lavezzari','Francis Tattegrain','Albert Besnard'],ok:2,wy:'Le peintre Albert Besnard a décoré toute une chapelle. C\'était pour dire merci. Son fils avait été soigné et guéri à Berck pendant 2 ans. Il a peint des grandes images sur les murs.',anec:'📅 Le Musée Opale Sud fait des expositions toute l\'année. Il est au 60 rue de l\'Impératrice. Tu peux y découvrir l\'histoire de Berck.'},
    {nm:'Le Marché Couvert',c:[50.4020,1.5660],vi:{bg:'linear-gradient(135deg,#7A3800,#4A2000)',em:'🐟',cap:'Marché couvert'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Berck-Plage_vue_aerienne.jpg/640px-Berck-Plage_vue_aerienne.jpg',rd:'Voici le Marché Couvert, rue des Halles. Le premier marché couvert de Berck-Plage a été construit en 1895. Le marché a lieu le mercredi et le samedi matin.',q:'Quels jours peut-on faire son marché à Berck-Ville, près de la Mairie ?',op:['Lundi et mercredi matin','Jeudi et samedi soir','Mardi, vendredi et dimanche matin'],ok:2,wy:'Le marché de Berck-Ville est devant la Mairie. Il a lieu le mardi, vendredi et dimanche matin. Le marché de Berck-Plage, lui, est ici aux Halles le mercredi et samedi matin.',anec:'🎣 La Bénédiction de la Mer a lieu chaque année à la mi-août. Il y a une messe à l\'air libre. Les bateaux sont décorés. Les gens portent des habits anciens. C\'est très beau !'}
  ]},
  {id:6,ic:'🌿',col:'#005B6E',cd:'#003848',cl:'#DDF0F5',nm:'Nature et Littoral',ds:'Dunes, phoques et plage',acc:'⚠️ Sable, partiellement accessible',dist:'2,5 km',time:'1 heure',mission:'Ramène une coquille vide trouvée sur la plage (moule, couteau ou coque).',
  steps:[
    {nm:'Départ — Promenade Debeyre',c:[50.4040,1.5588],vi:{bg:'linear-gradient(135deg,#003848,#005B6E)',em:'🌊',cap:'Promenade Debeyre'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Berck_sur_mer.jpg/640px-Berck_sur_mer.jpg',rd:'Depuis le Centre La Molière, va jusqu\'à la Promenade Debeyre. Elle longe la mer pendant 1 km. Regarde comme la plage est grande !',q:'Pourquoi la plage de Berck est-elle si grande à marée basse ?',op:['La mer est très peu profonde','La marée descend très bas et découvre des kilomètres de sable','Les vagues déposent beaucoup de sable'],ok:1,wy:'À Berck, la mer monte et descend beaucoup. La différence peut être de 9 mètres ! Quand la mer descend, elle laisse des kilomètres de sable ferme. C\'est parfait pour le char à voile.',anec:'⛑️ Il y a des «\u00a0bâches\u00a0» sur la plage. Ce sont des creux remplis d\'eau cachés sous le sable. Ils sont dangereux. Des sauveteurs protègent les baigneurs depuis 1866.'},
    {nm:'Les Ganivelles et les Dunes',c:[50.4075,1.5635],vi:{bg:'linear-gradient(135deg,#005B6E,#007B8A)',em:'🌾',cap:'Ganivelles et oyats'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/Ammophila_arenaria_kust.jpg/640px-Ammophila_arenaria_kust.jpg',rd:'Regarde les grandes barrières en bois tressé le long des dunes. Ce sont les ganivelles. Elles protègent le sable. Entre les ganivelles, il y a une grande herbe verte. Elle s\'appelle l\'oyat.',q:'À quoi servent les ganivelles ?',op:['À empêcher les gens d\'aller dans les dunes','À freiner le vent pour que le sable reste et que les dunes grandissent','À décorer le bord de plage'],ok:1,wy:'Les ganivelles arrêtent le vent. Le sable reste en place. L\'oyat pousse et tient le sable avec ses racines. Sans ganivelles, les dunes disparaîtraient peu à peu.',anec:'🌱 L\'oyat s\'appelle Ammophila en latin. Cela veut dire «\u00a0qui aime le sable\u00a0». C\'est une plante très résistante. Elle supporte le vent, le sel et le sable.'},
    {nm:'La Grande Plage',c:[50.4092,1.5625],vi:{bg:'linear-gradient(135deg,#003848,#0277A0)',em:'🏖️',cap:'Grande Plage'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Berck_sur_mer.jpg/640px-Berck_sur_mer.jpg',rd:'Tu es sur la Grande Plage. En 1891, Émile Wenz a fait quelque chose d\'incroyable ici. Il a attaché un appareil photo à un cerf-volant. Il a pris la première photo du ciel de toute l\'histoire !',q:'En quelle année a été prise la première photo aérienne de l\'histoire, à Berck ?',op:['En 1870','En 1920','En 1891'],ok:2,wy:'En 1891, Émile Wenz a accroché un appareil photo à un cerf-volant. Le cerf-volant est monté en l\'air. L\'appareil a pris une photo de la plage vue du ciel. C\'était une première mondiale !',anec:'🎈 En 1904, Gabriel Voisin testait des planeurs sur les dunes de Berck. Le peintre Jan Lavezzari a aussi sauté des dunes avec un planeur qu\'il avait inventé lui-même.'},
    {nm:'Les Phoques — Baie de l\'Authie',c:[50.3950,1.5600],vi:{bg:'linear-gradient(135deg,#005B6E,#003848)',em:'🦭',cap:'Les phoques'},img:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Harbour_seal_on_rock.jpg/640px-Harbour_seal_on_rock.jpg',rd:'Marche vers le sud jusqu\'à la Baie de l\'Authie. Quand la marée est basse, regarde les bancs de sable. Tu peux voir des phoques allongés au soleil ! Reste à plus de 300 mètres.',q:'Combien d\'espèces de phoques vit-on dans la Baie de l\'Authie ?',op:['2 espèces : le Phoque veau-marin et le Phoque gris','1 seule espèce','4 espèces différentes'],ok:0,wy:'Dans la Baie de l\'Authie, il y a 2 espèces de phoques. Le Phoque veau-marin et le Phoque gris. Il y en a plus de 500. C\'est un endroit rare où les phoques font leurs petits.',anec:'🦅 La Baie de l\'Authie accueille aussi plus de 250 espèces d\'oiseaux. Chaque automne, des milliers d\'oiseaux s\'y arrêtent pour se reposer. C\'est une zone naturelle protégée.'},info:{
  titre:'🦭 Les phoques — À savoir',
  items:[
    '👁️ Visibles tous les jours, toutes saisons, 2h30 avant la marée basse.',
    '📏 Reste à plus de 300 mètres. Ne franchis pas l'Authie.',
    '🐶 Tiens ton chien en laisse. Les phoques ont peur et peuvent fuir.',
    '🐣 Si tu vois un bébé phoque seul, reste calme. Sa mère va revenir.',
    '🚨 Phoque en détresse ? Appelle le réseau PELAGIS : 05 46 44 99 10.',
    '🌿 2 espèces ici : le Phoque veau-marin et le Phoque gris.',
    '🐟 Ils chassent sous l'eau grâce à leurs moustaches. Ils repèrent un poisson à 180 mètres !'
  ]
},

/* ============================================================  ÉTAT  */
let G={sc:'welcome',rt:null,st:0,ph:'riddle',ch:null,sc2:0,ans:[]};
function set(p){killMap();Object.assign(G,p);render();}

/* ============================================================  RENDU  */
function render(){
  const app=document.getElementById('app');
  if(G.sc==='welcome') rWelcome(app);
  else if(G.sc==='routes') rRoutes(app);
  else if(G.sc==='game')   rGame(app);
  else if(G.sc==='end')    rEnd(app);
}

/* ── ACCUEIL ── */
function rWelcome(app){

  app.innerHTML=`
<div class="hero" style="background:linear-gradient(160deg,#003F75 0%,#005CA8 55%,#007BB3 100%)" role="banner">
  <span class="hero__em" role="img" aria-label="Vagues">🌊</span>
  <h1 class="hero__h1">Berck Aventure</h1>
  <p class="hero__sub">Jeu de piste au départ de l'UGECAM Centre La Molière<br>Boulevard de Paris · Berck-sur-Mer</p>
  <div style="background:rgba(255,255,255,.13);border:2px solid rgba(255,255,255,.4);border-radius:var(--r-xl);
       padding:1.25rem 1.5rem;text-align:left;width:100%;max-width:440px;margin-bottom:1.75rem">

    <span aria-hidden="true">🚀</span> Choisir mon parcours !

/* ── SÉLECTION PARCOURS ── */
function rRoutes(app){
  spk='Choisissez votre parcours. '+ROUTES.map(r=>r.nm+' : '+r.ds+'. '+r.acc).join('. ');
  app.innerHTML=`<div class="scroll">
<h2 style="font-size:clamp(1.125rem,3vw,1.375rem);font-weight:900;margin-bottom:1rem;text-align:center">
  Quel parcours choisissez-vous ?
</h2>
${ROUTES.map((r,i)=>`
<div class="rcard" onclick="pickR(${i})" role="button" tabindex="0"
     onkeydown="if(event.key==='Enter'||event.key===' ')pickR(${i})"
     aria-label="Choisir le parcours ${r.nm}, ${r.ds}, ${r.acc}, ${r.dist}, ${r.steps.length} étapes">
  <div class="rcard__head" style="background:${r.col}18">
    <span style="font-size:2.5rem" aria-hidden="true">${r.ic}</span>
    <div>
      <div style="font-size:1.125rem;font-weight:900;color:${r.col}">${r.nm}</div>
      <div style="font-size:.875rem;color:var(--c-ts);margin-top:.125rem">${r.ds}</div>
    </div>
  </div>
  <div class="rcard__body">
    <div style="display:flex;flex-wrap:wrap">
      <span class="badge-pill" style="background:${r.cl};color:${r.cd};border-color:${r.col}">${r.acc}</span>
      <span class="badge-pill" style="background:var(--c-bg);color:var(--c-ts);border-color:var(--c-bol)">📏 ${r.dist}</span>
      <span class="badge-pill" style="background:var(--c-bg);color:var(--c-ts);border-color:var(--c-bol)">⏱️ ${r.time}</span>
      <span class="badge-pill" style="background:var(--c-bg);color:var(--c-ts);border-color:var(--c-bol)">${r.steps.length} étapes</span>
    </div>
    <div class="mission">🎁 Mission : ${r.mission}</div>
  </div>
</div>`).join('')}
</div>`;
}

function pickR(i){set({sc:'game',rt:ROUTES[i],st:0,ph:'riddle',ch:null,sc2:0,ans:[]});}

/* ── JEU ── */
function rGame(app){
  const rt=G.rt,step=rt.steps[G.st],tot=rt.steps.length;
  spk=`Étape ${G.st+1} sur ${tot} : ${step.nm}. ${step.rd}`;
  const pct=Math.round(((G.st+(G.ph==='feedback'?1:0))/tot)*100);

  const dots=rt.steps.map((_,i)=>{
    const c=i<G.st?'dot-done':i===G.st?'dot-cur':'dot-fut';
    const l=i<G.st?'terminée':i===G.st?'en cours':'à venir';
    return`<div class="dot ${c}" role="img" aria-label="Étape ${i+1} ${l}"></div>`;
  }).join('');

  const visual=`
<div class="stepimg" style="background:${step.vi.bg}" role="img" aria-label="${step.nm}">
  <img src="${step.img}" alt="${step.nm}" loading="lazy" onerror="this.style.display='none'"/>
  <div class="stepimg__fb" aria-hidden="true">
    <span class="stepimg__em">${step.vi.em}</span>
    <span class="stepimg__cap">${step.vi.cap}</span>
  </div>
</div>`;

  let panel='';
  if(G.ph==='riddle'){
    panel=`
<div class="card">
  <h2 style="font-size:1.0625rem;font-weight:900;color:${rt.cd};margin-bottom:.625rem">${step.nm}</h2>
  <p style="font-size:1rem;line-height:1.7;color:var(--c-ts);margin-bottom:.875rem">${step.rd}</p>
  <div class="hint" role="note">
    <span aria-hidden="true" style="font-size:1.25rem;flex-shrink:0">📍</span>
    <span>Rendez-vous à cet endroit, puis cliquez sur le <strong>marqueur animé</strong> sur la carte, ou sur le bouton ci-dessous.</span>
  </div>
  <button class="btn" style="background:${rt.col}" onclick="set({ph:'question'})"
          aria-label="Je suis arrivé à l'étape ${G.st+1}">
    <span aria-hidden="true">✔</span> J'y suis ! Voir la question
  </button>
</div>`;
  }
  else if(G.ph==='question'){
    /* Légende daltonisme visible avant les options */
    const opts=step.op.map((o,i)=>`
<button class="opt" onclick="ansQ(${i})"
        aria-label="Choix ${String.fromCharCode(65+i)} : ${o}">
  <span class="opt__n" aria-hidden="true">${String.fromCharCode(65+i)}</span>
  <span>${o}</span>
</button>`).join('');
    panel=`
<div class="card">
  <p style="font-size:.8125rem;font-weight:700;color:var(--c-tm);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem">Question — Étape ${G.st+1}</p>
  <p style="font-size:1.0625rem;font-weight:700;line-height:1.55;margin-bottom:1rem" id="qtext">${step.q}</p>
  <div class="legend" aria-label="Légende des réponses" role="note">
    <span class="legend__item legend__ok" aria-label="Couleur bleue = bonne réponse">
      <span aria-hidden="true">■</span> Bonne réponse (bleu)
    </span>
    <span class="legend__item legend__ko" aria-label="Couleur orange = mauvaise réponse">
      <span aria-hidden="true">■</span> Mauvaise réponse (orange)
    </span>
  </div>
  <div role="group" aria-labelledby="qtext">${opts}</div>
</div>`;
  }
  else if(G.ph==='feedback'){
    const ok=G.ch===step.ok;
    const opts=step.op.map((o,i)=>{
      const cl=i===step.ok?'ok':i===G.ch&&!ok?'ko':'neut';
      const ic=i===step.ok?'✓':i===G.ch&&!ok?'✗':String.fromCharCode(65+i);
      const al=i===step.ok?`Bonne réponse : ${o}`:i===G.ch&&!ok?`Réponse incorrecte : ${o}`:o;
      return`<button class="opt ${cl}" disabled aria-label="${al}">
        <span class="opt__n" aria-hidden="true">${ic}</span><span>${o}</span>
      </button>`;
    }).join('');
    panel=`
<div class="card">
  <p style="font-size:.8125rem;font-weight:700;color:var(--c-tm);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem">Question — Étape ${G.st+1}</p>
  <p style="font-size:1.0625rem;font-weight:700;line-height:1.55;margin-bottom:1rem">${step.q}</p>
  <div>${opts}</div>
  <div class="fbbox ${ok?'fbbox-ok':'fbbox-ko'}" role="alert" aria-live="assertive">
    <div class="fbbox__h">
      <span aria-hidden="true">${ok?'✅':'❌'}</span>
      <span>${ok?'Bonne réponse !':'Pas tout à fait...'}</span>
    </div>
    ${!ok?`<p style="margin-bottom:.5rem">Bonne réponse : <strong>${step.op[step.ok]}</strong></p>`:''}
    <p>${step.wy}</p>
  </div>
  <div class="anec" role="note">
    <strong>💡 Le saviez-vous ?</strong><br>${step.anec}
  </div>
  ${step.info?`<div class="info-card" role="note" style="${step.info.bg?'background:'+step.info.bg+';border-color:'+step.info.bo+';color:'+step.info.bo:''  }"><div class="info-card__title">${step.info.titre}</div>${step.info.items.map(it=>`<div class="info-card__item">${it}</div>`).join('')}</div>`:''}}
  <div style="height:.25rem"></div>
  <button class="btn" style="background:${rt.col}" onclick="nx()"
          aria-label="${G.st<tot-1?'Étape suivante':'Voir mon badge'}">
    <span aria-hidden="true">${G.st<tot-1?'➡':'🏁'}</span>
    ${G.st<tot-1?'Étape suivante':'Voir mon badge !'}
  </button>
</div>`;
  }

  app.innerHTML=`
<div>
  <div id="map" role="application"
       aria-label="Carte du parcours ${rt.nm} — ${tot} étapes"></div>
  <div class="scroll">
    <div class="sechead">
      <button class="btn btn-ghost" onclick="set({sc:'routes'})"
              aria-label="Retour au choix de parcours">
        <span aria-hidden="true">←</span> Parcours
      </button>
      <div class="scbadge" aria-label="Score : ${G.sc2} bonne${G.sc2>1?'s':''} réponse${G.sc2>1?'s':''} sur ${G.st}">
        ⭐ ${G.sc2} / ${G.st}
      </div>
    </div>
    <div class="prog" role="progressbar"
         aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100"
         aria-label="Progression ${pct} pourcent">
      <div class="prog__row">
        <span style="font-weight:900;color:${rt.cd}">${rt.nm}</span>
        <span>Étape <strong>${G.st+1}</strong>&nbsp;/&nbsp;${tot}</span>
      </div>
      <div class="prog__track">
        <div class="prog__fill" style="width:${pct}%;background:${rt.col}"></div>
      </div>
    </div>
    <div class="dotrow" aria-hidden="true">${dots}</div>
    ${visual}
    ${panel}
  </div>
</div>`;
  buildMap(rt.steps,G.st,rt.col);
}

/* ── BADGE FINAL ── */
function rEnd(app){
  const rt=G.rt,tot=rt.steps.length,sc=G.sc2;
  const pct=Math.round((sc/tot)*100);
  const tr=sc===tot?'🏆':sc>=tot*.8?'🥇':sc>=tot*.6?'🥈':'🥉';
  const msg=sc===tot?'Score parfait !':sc>=tot*.8?'Excellent travail !':sc>=tot*.6?'Très bien joué !':'Bonne exploration !';
  const sub=sc===tot?'Vous connaissez Berck comme votre poche !':sc>=tot*.8?'Vous êtes un vrai explorateur berquois !':sc>=tot*.6?'Berck n\'a presque plus de secrets pour vous !':'Chaque visite est une nouvelle découverte !';
  const td=new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  spk=`Félicitations ! ${msg} ${sub} ${sc} bonnes réponses sur ${tot}, soit ${pct} pour cent.`;

  const recap=rt.steps.map((s,i)=>`
<div class="rcap ${G.ans[i]?'rcap-ok':'rcap-ko'}" role="listitem"
     aria-label="Étape ${i+1} ${s.nm} : ${G.ans[i]?'réussie':'échouée'}">
  <span aria-hidden="true">${G.ans[i]?'✅':'❌'}</span>
  <span style="font-size:.875rem">${s.nm}</span>
</div>`).join('');

  app.innerHTML=`<div class="scroll">

<div style="background:linear-gradient(135deg,${rt.cd},${rt.col});border-radius:var(--r-xl);
     padding:clamp(1.25rem,4vw,1.75rem);text-align:center;color:#fff;margin-bottom:1rem"
     role="region" aria-label="Résultats">
  <span role="img" aria-label="${msg}"
        style="font-size:clamp(3rem,12vw,4.5rem);display:block;margin-bottom:.5rem;animation:bounce .9s ease 2">
    ${tr}
  </span>
  <h1 style="font-size:clamp(1.375rem,4vw,1.875rem);font-weight:900;margin-bottom:.25rem">${msg}</h1>
  <p style="opacity:.9;margin-bottom:1.25rem;font-size:.9375rem">${sub}</p>
  <div style="background:rgba(255,255,255,.15);border-radius:var(--r-md);padding:1.125rem;
       border:2px solid rgba(255,255,255,.35)"
       aria-label="${sc} bonnes réponses sur ${tot} — ${pct} pourcent">
    <div style="font-size:clamp(2.5rem,10vw,3.5rem);font-weight:900;line-height:1">
      ${sc}<span style="font-size:1.25rem;opacity:.8"> / ${tot}</span>
    </div>
    <div style="font-size:.9375rem;opacity:.85;margin-top:.25rem">${pct}&nbsp;% de bonnes réponses</div>
    <div style="margin-top:.625rem;font-size:1.5rem" aria-hidden="true">
      ${rt.steps.map((_,i)=>G.ans[i]?'⭐':'○').join(' ')}
    </div>
  </div>
</div>

<div class="diploma" role="region" aria-label="Diplôme du découvreur">
  <span class="diploma__ic" role="img" aria-label="Diplôme">🎓</span>
  <h2 class="diploma__h">Diplôme du Découvreur</h2>
  <p class="diploma__sub">Berck-sur-Mer · ${td}</p>
  <div class="diploma__seal">
    Ce diplôme atteste que vous avez complété<br>
    le parcours <strong>«&nbsp;${rt.ic} ${rt.nm}&nbsp;»</strong><br>
    depuis l'UGECAM Centre La Molière<br>
    et découvert les trésors de la Côte d'Opale !
  </div>
</div>

<div class="card">
  <h2 style="font-size:1rem;font-weight:900;margin-bottom:.875rem">📋 Récapitulatif</h2>
  <div role="list">${recap}</div>
</div>

<div class="btn2" style="margin-bottom:.5rem">
  <button class="btn" style="background:${rt.col}"
          onclick="set({sc:'game',rt:G.rt,st:0,ph:'riddle',ch:null,sc2:0,ans:[]})"
          aria-label="Recommencer ce parcours">
    <span aria-hidden="true">🔄</span> Recommencer
  </button>
  <button class="btn btn-sec"
          onclick="set({sc:'routes'})"
          aria-label="Choisir un autre parcours">
    <span aria-hidden="true">🗺️</span> Autre parcours
  </button>
</div>
<button class="btn btn-ghost" style="width:100%;display:flex;justify-content:center"
        onclick="set({sc:'welcome'})" aria-label="Retour à l'accueil">
  🏠 Accueil
</button>

</div>`;
}

/* ============================================================  ACTIONS  */
function ansQ(i){
  if(G.ch!==null)return;
  const ok=i===G.rt.steps[G.st].ok;
  set({ch:i,sc2:G.sc2+(ok?1:0),ans:[...G.ans,ok],ph:'feedback'});
}
function nx(){
  if(G.st<G.rt.steps.length-1) set({st:G.st+1,ph:'riddle',ch:null});
  else set({sc:'end'});
}

render();
</script>
</body>
</html>
