<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Berck Aventure — UGECAM La Mollière</title>
<meta name="description" content="Jeu de piste accessible depuis l'UGECAM Centre La Mollière, Boulevard de Paris, Berck-sur-Mer"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ============================================================
   TOKENS — WCAG 2.1 AA  |  100 % daltonien-safe
   Remplacement vert/rouge (problématique) → bleu/orange
   ============================================================
   Vérifications WebAIM Contrast Checker :
   --c-ok  #004D99 sur #DDE8F5 → 9.6:1  ✓ AA + AAA
   --c-ko  #944200 sur #FCEEE0 → 6.4:1  ✓ AA
   --c-p   #005CA8 sur blanc   → 7.2:1  ✓ AA + AAA
   Distincts pour protanopie, deutéranopie, tritanopie ✓
   ============================================================ */
:root{
  --c-p:      #005CA8;  /* Bleu principal   7.2:1 ✓ */
  --c-pd:     #003F75;  /* Bleu foncé      11.4:1 ✓ */
  --c-pl:     #E8F1F9;  /* Bleu pâle (fond) */
  --c-t:      #1A1A1A;  /* Texte principal  17.9:1 ✓ */
  --c-ts:     #3D3D3D;  /* Texte secondaire 10.3:1 ✓ */
  --c-tm:     #595959;  /* Texte atténué     7.0:1 ✓ */
  --c-bg:     #F4F6F9;
  --c-card:   #FFFFFF;
  --c-bo:     #767676;  /* Bordure 4.5:1 ✓ */
  --c-bol:    #BDBDBD;
  /* ✅ Correct → BLEU (remplace vert, sûr pour daltoniens) */
  --c-ok:     #004D99;  /* Bleu foncé 9.6:1 ✓ */
  --c-ok-bg:  #DDE8F5;
  /* ❌ Incorrect → ORANGE (remplace rouge, sûr pour daltoniens) */
  --c-ko:     #944200;  /* Orange foncé 6.4:1 ✓ */
  --c-ko-bg:  #FCEEE0;
  /* Ambre texte foncé */
  --c-am:     #5B4000;  /* 8.7:1 ✓ */
  --c-am-bg:  #FFF3CD;
  --tap: 48px;
  --r-sm:6px; --r-md:12px; --r-lg:18px; --r-xl:24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
* {-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html{font-size:16px;-webkit-text-size-adjust:100%}
@font-face{
  font-family:'AtkinsonHL';
  src:url('https://cdn.jsdelivr.net/fontsource/fonts/atkinson-hyperlegible@latest/latin-400-normal.woff2') format('woff2');
  font-weight:400;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'AtkinsonHL';
  src:url('https://cdn.jsdelivr.net/fontsource/fonts/atkinson-hyperlegible@latest/latin-700-normal.woff2') format('woff2');
  font-weight:700;font-style:normal;font-display:swap;
}
body{font-family:'AtkinsonHL',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  background:var(--c-bg);color:var(--c-t);line-height:1.6;min-height:100svh}
/* body.dys → voir @font-face ci-dessous */
body.hc{--c-p:#7FC4FF;--c-pd:#BFE0FF;--c-pl:#132A3D;--c-t:#F5F7FA;
  --c-ts:#D8DDE4;--c-tm:#A9B0BA;
  --c-card:#1C1F24;--c-bg:#101215;--c-bo:#8A909A;--c-bol:#3C4149;
  --c-ok:#7FC4FF;--c-ok-bg:#0F2C42;--c-ko:#FFB877;--c-ko-bg:#3B2408;
  --c-am:#FFDD8A;--c-am-bg:#3A2E06}
body.hc .stepimg{background:#1C1F24!important}
body.hc img{filter:brightness(.92) contrast(1.05)}

/* ---- SKIP LINK ---- */
.skip{position:absolute;top:-120px;left:1rem;background:var(--c-p);color:#fff;
  padding:.75rem 1.25rem;border-radius:var(--r-md);font-weight:700;z-index:10000;
  text-decoration:none;transition:top .1s}
.skip:focus{top:1rem}

/* ---- FOCUS (ne jamais supprimer — WCAG 2.4.7) ---- */
:focus-visible{outline:3px solid var(--c-p);outline-offset:3px;border-radius:4px}
:focus:not(:focus-visible){outline:none}

/* ---- BARRE A11Y ---- */
.a11y{background:var(--c-card);border-bottom:2px solid var(--c-bol);
  padding:.5rem clamp(.75rem,3vw,1.5rem);display:flex;gap:.5rem;flex-wrap:wrap;
  align-items:center;position:sticky;top:0;z-index:1000}
#a11y-fab{position:fixed;top:.875rem;right:.875rem;z-index:2000;
  width:48px;height:48px;border-radius:50%;background:var(--c-card);
  border:2px solid var(--c-bo);color:var(--c-t);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(0,0,0,.22);touch-action:manipulation}
#a11y-fab:hover{background:var(--c-pl)}
#a11y-fab:focus-visible{outline:3px solid var(--c-p);outline-offset:2px}
.a11y__lbl{font-size:.8125rem;font-weight:700;color:var(--c-tm);
  text-transform:uppercase;letter-spacing:.05em;margin-right:.25rem}
.a11y-btn{min-height:var(--tap);min-width:var(--tap);touch-action:manipulation;padding:.4rem .875rem;
  background:var(--c-bg);border:2px solid var(--c-bo);border-radius:var(--r-sm);
  font-size:.875rem;font-weight:700;color:var(--c-t);cursor:pointer;
  font-family:inherit;display:flex;align-items:center;gap:.35rem;transition:background .15s}
.a11y-btn:hover{background:var(--c-pl)}
.a11y-btn[aria-pressed=true]{background:var(--c-p);color:#fff;border-color:var(--c-pd)}

/* ---- LAYOUT ---- */
.app{max-width:720px;margin:0 auto;min-height:100svh;background:var(--c-bg)}

/* ---- CARTE LEAFLET ---- */
#map{height:clamp(230px,40vw,320px);width:100%;border-bottom:3px solid var(--c-bol);touch-action:pan-x pan-y;}
.mk{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.9375rem;font-weight:900;
  border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,.4)}
.mk-done {background:#004D99;color:#fff}
.mk-fut  {background:#595959;color:#fff;opacity:.75}
.mk-cur  {background:var(--r-col,#005CA8);color:#fff;animation:mpulse 1.8s ease-in-out infinite}
@keyframes mpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* ---- SCROLL ---- */
.scroll{padding:clamp(.75rem,3vw,1.25rem);scroll-behavior:smooth;padding-bottom:calc(clamp(.75rem,3vw,1.25rem) + env(safe-area-inset-bottom,0px))}

/* ---- CARD ---- */
.card{background:var(--c-card);border-radius:var(--r-lg);
  padding:clamp(1rem,3vw,1.25rem);border:1px solid var(--c-bol);margin-bottom:1rem}

/* ---- BOUTONS ---- */
.btn{display:flex;align-items:center;justify-content:center;gap:.5rem;touch-action:manipulation;user-select:none;-webkit-user-select:none;
  min-height:var(--tap);width:100%;padding:.75rem 1.25rem;
  background:var(--c-p);color:#fff;border:2px solid transparent;
  border-radius:var(--r-md);font-size:clamp(1rem,2.5vw,1.0625rem);font-weight:700;
  cursor:pointer;font-family:inherit;text-align:center;
  transition:background .15s,transform .1s}
.btn:hover{background:var(--c-pd)}
.btn:active{transform:scale(.98)}
.btn:focus{outline:none}
.btn-sec{background:var(--c-card);color:var(--c-pd);border-color:var(--c-p)}
.btn-sec:hover{background:var(--c-pl)}
.btn-ghost{background:transparent;color:var(--c-t);border-color:var(--c-bo);
  width:auto;padding:.5rem .875rem;font-size:.875rem}
.btn-ghost:hover{background:var(--c-bg)}

/* ---- OPTIONS QCM ---- */
.opt{display:flex;align-items:flex-start;gap:.75rem;min-height:var(--tap);touch-action:manipulation;width:100%;
  padding:.875rem 1rem;background:var(--c-card);border:2px solid var(--c-bo);
  border-radius:var(--r-md);font-size:clamp(.9375rem,2.5vw,1rem);font-weight:600;
  text-align:left;color:var(--c-t);cursor:pointer;font-family:inherit;
  margin-bottom:.625rem;transition:background .1s,border-color .1s,transform .1s;
  line-height:1.5}
.opt:hover:not(:disabled){background:var(--c-pl);border-color:var(--c-p)}
.opt:active:not(:disabled){transform:scale(.99)}
/* ✅/❌ : couleur + icône + texte (jamais couleur seule — WCAG 1.4.1) */
.ok   {background:var(--c-ok-bg);border-color:var(--c-ok);color:var(--c-ok)}
.ko   {background:var(--c-ko-bg);border-color:var(--c-ko);color:var(--c-ko)}
.neut {background:var(--c-bg);border-color:var(--c-bol);color:var(--c-tm)}
.opt__n{flex-shrink:0;width:28px;height:28px;border-radius:50%;
  background:var(--c-bg);border:2px solid var(--c-bol);
  display:flex;align-items:center;justify-content:center;
  font-size:.8125rem;font-weight:900;margin-top:1px}
.ok .opt__n{background:var(--c-ok);color:#fff;border-color:var(--c-ok)}
.ko .opt__n{background:var(--c-ko);color:#fff;border-color:var(--c-ko)}

/* ---- PROGRESSION ---- */
.prog{margin-bottom:.875rem}
.prog__row{display:flex;justify-content:space-between;font-size:.875rem;
  font-weight:700;color:var(--c-ts);margin-bottom:.375rem}
.prog__track{height:10px;background:var(--c-bol);border-radius:5px;overflow:hidden}
.prog__fill{height:100%;border-radius:5px;transition:width .4s ease}

/* ---- POINTS ÉTAPE ---- */
.dotrow{display:flex;gap:6px;align-items:center;justify-content:center;
  margin-bottom:.75rem;flex-wrap:wrap}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid transparent;flex-shrink:0}
.dot-done{background:#004D99;border-color:#004D99}
.dot-cur{background:var(--c-p);border-color:var(--c-pd);box-shadow:0 0 0 3px rgba(0,92,168,.25)}
.dot-fut{background:transparent;border-color:var(--c-bol)}

/* ---- VISUEL ÉTAPE ---- */
.stepimg{width:100%;height:clamp(155px,28vw,205px);border-radius:var(--r-md);
  overflow:hidden;margin-bottom:1rem;display:flex;align-items:center;
  justify-content:center;position:relative;border:2px solid var(--c-bol)}
.stepimg img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0}
.stepimg__fb{display:none;flex-direction:column;align-items:center;
  justify-content:center;gap:.5rem;padding:1rem;width:100%;height:100%;
  position:relative;z-index:1}
.stepimg__em{font-size:clamp(3rem,10vw,3.75rem);line-height:1;color:#fff;filter:drop-shadow(0 1px 4px rgba(0,0,0,.4))}
.stepimg__cap{font-size:.8125rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.55)}

/* ---- BOÎTES INFO ---- */
.hint{background:var(--c-pl);border:2px solid var(--c-p);border-radius:var(--r-md);
  padding:.875rem 1rem;margin-bottom:1rem;font-size:.9375rem;
  color:var(--c-pd);font-weight:700;display:flex;gap:.625rem;align-items:flex-start}

/* ---- FENÊTRE GUIDAGE (modale) ---- */
.nav-btn{display:flex;align-items:center;justify-content:center;gap:.5rem;
  min-height:44px;width:100%;padding:.625rem 1rem;background:var(--c-card);
  border:2px solid var(--c-p);border-radius:var(--r-md);color:var(--c-pd);
  font-weight:700;font-size:.9375rem;cursor:pointer;font-family:inherit;
  margin-bottom:.875rem;touch-action:manipulation}
.nav-btn:hover{background:var(--c-pl)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:5000;
  display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:640px){.modal-ov{align-items:center;padding:1rem}}
.modal-box{background:var(--c-card);border-radius:var(--r-xl) var(--r-xl) 0 0;
  max-width:480px;width:100%;max-height:88vh;overflow-y:auto;
  padding:1.5rem;position:relative;animation:modalUp .2s ease}
@media(min-width:640px){.modal-box{border-radius:var(--r-xl)}}
@keyframes modalUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:absolute;top:1rem;right:1rem;width:36px;height:36px;
  border-radius:50%;border:2px solid var(--c-bo);background:var(--c-bg);
  font-size:1.125rem;font-weight:900;cursor:pointer;display:flex;
  align-items:center;justify-content:center;color:var(--c-t)}
.modal-close:hover{background:var(--c-bol)}
.modal-h{font-size:1.125rem;font-weight:900;margin-bottom:.25rem;padding-right:2.5rem}
.modal-sub{font-size:.875rem;color:var(--c-tm);margin-bottom:1.125rem}
.modal-row{display:flex;gap:.75rem;align-items:flex-start;padding:.75rem 0;
  border-bottom:1px solid var(--c-bg)}
.modal-row:last-of-type{border-bottom:none}
.modal-row__ic{font-size:1.25rem;flex-shrink:0;width:28px;text-align:center}
.modal-row__lbl{font-size:.75rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;color:var(--c-tm);margin-bottom:.125rem}
.modal-row__val{font-size:.9375rem;font-weight:600;color:var(--c-t);line-height:1.5}
.modal-maps{display:flex;align-items:center;justify-content:center;gap:.5rem;
  min-height:48px;width:100%;padding:.875rem 1rem;background:#005CA8;color:#fff;
  border:none;border-radius:var(--r-md);font-weight:900;font-size:1rem;
  text-decoration:none;margin-top:1.125rem;touch-action:manipulation}
.modal-maps:hover{background:#003F75}
.modal-note{font-size:.8125rem;color:var(--c-tm);margin-top:.75rem;line-height:1.5}
.info-card{background:#E3F4FD;border:2px solid #005B6E;border-radius:var(--r-md);padding:1rem;margin-top:.875rem;font-size:.9375rem;color:#003848}
.info-card__title{font-weight:900;font-size:1rem;margin-bottom:.625rem;display:flex;align-items:center;gap:.5rem}
.info-card__item{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.5rem;font-size:.9375rem;line-height:1.55}
.info-card__item:last-child{margin-bottom:0}
.anec{background:var(--c-am-bg);border:2px solid var(--c-am);
  border-radius:var(--r-md);padding:.875rem 1rem;margin-top:.875rem;
  font-size:.9375rem;color:var(--c-am);line-height:1.65}
.fbbox{border-radius:var(--r-md);padding:1rem;margin-top:.875rem;
  font-size:.9375rem;line-height:1.65;border:2px solid}
.fbbox-ok{background:var(--c-ok-bg);border-color:var(--c-ok);color:var(--c-ok)}
.fbbox-ko{background:var(--c-ko-bg);border-color:var(--c-ko);color:var(--c-ko)}
.fbbox__h{font-weight:900;font-size:1.0625rem;margin-bottom:.5rem;
  display:flex;align-items:center;gap:.5rem}
/* Légende daltonisme */
.legend{display:flex;gap:.625rem;font-size:.8125rem;font-weight:700;margin-bottom:.75rem;
  flex-wrap:wrap}
.legend__item{display:flex;align-items:center;gap:.375rem;padding:.3rem .75rem;
  border-radius:100px;border:2px solid}
.legend__ok{background:var(--c-ok-bg);color:var(--c-ok);border-color:var(--c-ok)}
.legend__ko{background:var(--c-ko-bg);color:var(--c-ko);border-color:var(--c-ko)}

/* ---- HERO ACCUEIL ---- */
.hero{min-height:100svh;display:flex;flex-direction:column;
  color:#fff;overflow:hidden}
.hero__bannerwrap{width:100%;background:rgba(0,0,0,.12);flex-shrink:0}
.hero__banner{width:100%;max-height:38vh;object-fit:contain;display:block;margin:0 auto}
.hero__body{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:clamp(1.25rem,5vw,2.5rem) clamp(1rem,5vw,2rem);text-align:center}
.hero__em{font-size:clamp(4rem,15vw,5.5rem);margin-bottom:1rem;display:block}
.hero__h1{font-size:clamp(1.625rem,5vw,2.375rem);font-weight:900;margin-bottom:.5rem}
.hero__sub{font-size:clamp(1rem,2.5vw,1.0625rem);opacity:.95;
  margin-bottom:1.75rem;max-width:38ch;line-height:1.55}
.hero__cta{min-height:var(--tap);touch-action:manipulation;background:#fff;border:3px solid #fff;
  border-radius:var(--r-md);font-size:clamp(1rem,2.5vw,1.125rem);font-weight:900;
  padding:.875rem 2rem;cursor:pointer;font-family:inherit;
  transition:background .15s ease,transform .15s ease,box-shadow .15s ease;width:100%;max-width:440px;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  box-shadow:0 4px 14px rgba(0,0,0,.22)}
.hero__cta:hover{background:#F0F6FC;box-shadow:0 6px 18px rgba(0,0,0,.28);transform:translateY(-1px)}
.hero__cta:active{transform:scale(.98)}
.hero__cta:focus-visible{outline:3px solid #fff;outline-offset:4px;box-shadow:0 0 0 6px rgba(255,255,255,.35)}

/* ---- SÉLECTION PARCOURS ---- */
.rcard{background:var(--c-card);border-radius:var(--r-xl);margin-bottom:1rem;touch-action:manipulation;
  box-shadow:0 3px 14px rgba(0,0,0,.09);overflow:hidden;cursor:pointer;
  transition:transform .15s ease,box-shadow .15s ease;border:1px solid var(--c-bol)}
.rcard:hover{transform:scale(1.012);box-shadow:0 6px 20px rgba(0,0,0,.14)}
.rcard:active{transform:scale(.98)}
.rcard:focus-visible{outline:3px solid var(--c-p);outline-offset:2px;box-shadow:0 6px 20px rgba(0,0,0,.16)}
.rcard__head{padding:1.125rem 1.25rem .75rem;display:flex;align-items:center;gap:.875rem}
.rcard__body{padding:0 1.25rem 1.25rem}
.mission{background:var(--c-am-bg);border:2px dashed var(--c-am);
  border-radius:var(--r-md);padding:.75rem 1rem;color:var(--c-am);
  font-size:1rem;font-weight:700;margin-top:.625rem}
.badge-row{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin-top:.25rem}
@media(min-width:420px){.badge-row{grid-template-columns:repeat(4,auto);justify-content:start}}
.badge-pill{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;padding:.4rem .75rem;
  border-radius:100px;font-size:.875rem;font-weight:700;border:2px solid;line-height:1.3}
.rcard__sub{font-size:1rem;color:var(--c-ts);margin-top:.125rem;font-weight:500}

/* ---- HEADER JEU ---- */
.sechead{display:flex;align-items:center;justify-content:space-between;
  gap:.5rem;margin-bottom:.875rem;flex-wrap:wrap}
.scbadge{background:var(--c-pl);color:var(--c-pd);border:2px solid var(--c-p);
  border-radius:100px;padding:.3rem .875rem;font-size:.875rem;font-weight:900;
  white-space:nowrap}

/* ---- DIPLÔME FINAL ---- */
.diploma{background:var(--c-card);border:1px solid var(--c-bol);position:relative;overflow:hidden;
  border-radius:var(--r-xl);padding:clamp(2rem,6vw,3rem) clamp(1.5rem,5vw,2.25rem);
  text-align:center;margin-bottom:1rem;
  box-shadow:0 4px 18px rgba(0,0,0,.07)}
.diploma::before,.diploma::after{content:'';position:absolute;left:10px;right:10px;height:6px;
  background:repeating-linear-gradient(90deg,var(--diploma-col,#005CA8) 0 8px,transparent 8px 14px);opacity:.55}
.diploma::before{top:10px}
.diploma::after{bottom:10px}
.diploma__watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(70%,320px);height:min(70%,320px);opacity:.05;color:var(--diploma-col,#005CA8);
  pointer-events:none;z-index:0}
.diploma__content{position:relative;z-index:1}
.diploma__ic{display:block;margin:0 auto .75rem;color:var(--diploma-col,#005CA8);
  animation:bounce .9s ease 2}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-20px)}70%{transform:translateY(-8px)}}
.diploma__eyebrow{font-size:.8125rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--c-tm);margin-bottom:.5rem}
.diploma__h{font-size:clamp(1.375rem,4.5vw,1.75rem);font-weight:900;
  color:var(--c-t);margin-bottom:1.25rem}
.diploma__sub{font-size:.9375rem;color:var(--c-tm);margin-bottom:.5rem}
.diploma__seal{padding:0 .5rem;font-size:1.0625rem;
  color:var(--c-t);font-weight:600;line-height:1.85;margin-bottom:1.5rem}
.diploma__seal strong{color:var(--diploma-col,#005CA8)}
.diploma__stamp{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
  width:104px;height:104px;border-radius:50%;border:3px dashed var(--diploma-col,#005CA8);
  color:var(--diploma-col,#005CA8);transform:rotate(-8deg);margin:0 auto 1.25rem;
  font-size:.6875rem;font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1.3;
  background:color-mix(in srgb, var(--diploma-col,#005CA8) 6%, transparent)}
.diploma__num{font-size:.75rem;color:var(--c-bo);letter-spacing:.05em;margin-top:1.5rem}
.diploma__brand{display:flex;align-items:center;justify-content:center;gap:.4rem;
  margin-top:.375rem;font-size:.8125rem;font-weight:800;color:var(--c-tm)}

/* ---- RÉCAP FINAL ---- */
.rcap{display:flex;align-items:center;gap:.75rem;padding:.75rem .875rem;
  border-radius:var(--r-sm);margin-bottom:.5rem;font-size:.9375rem;
  font-weight:600;border:1px solid}

function diplomaNum(routeId,dateObj){
  const y=dateObj.getFullYear();
  const seed=(routeId*137+dateObj.getMonth()*31+dateObj.getDate()*7+dateObj.getHours()*3+dateObj.getMinutes())%9973;
  return `BA-${y}-${String(seed).padStart(5,'0')}`;
}

/* ============================================================  GUIDAGE (distance + direction) */
function distM(a,b){
  const R=6371000,toRad=d=>d*Math.PI/180;
  const dLat=toRad(b[0]-a[0]),dLon=toRad(b[1]-a[1]);
  const la1=toRad(a[0]),la2=toRad(b[0]);
  const h=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
  return R*2*Math.asin(Math.sqrt(h));
}
function bearingLabel(a,b){
  const toRad=d=>d*Math.PI/180;
  const la1=toRad(a[0]),la2=toRad(b[0]),dLon=toRad(b[1]-a[1]);
  const y=Math.sin(dLon)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dLon);
  let deg=(Math.atan2(y,x)*180/Math.PI+360)%360;
  const dirs=['Nord','Nord-Est','Est','Sud-Est','Sud','Sud-Ouest','Ouest','Nord-Ouest'];
  const i=Math.round(deg/45)%8;
  return {label:dirs[i],deg:Math.round(deg)};
}
function navHint(steps,idx){
  if(idx===0)return null; // le départ n'a pas de direction (c'est le point 0)
  const from=steps[idx-1].c, to=steps[idx].c;
  const d=Math.round(distM(from,to));
  const b=bearingLabel(from,to);
  const dtxt=d>=1000?(d/1000).toFixed(1).replace('.',',')+' km':d+' m';
  return {dist:dtxt,dir:b.label,deg:b.deg};
}

function buildMap(steps,cur,col){
  document.documentElement.style.setProperty('--r-col',col);
  setTimeout(()=>{
    const el=document.getElementById('map');if(!el)return;
    MAP=L.map('map',{zoomControl:true,attributionControl:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(MAP);
    const cc=steps.map(s=>s.c);
    L.polyline(cc,{color:'#9E9E9E',weight:5,dashArray:'10,7',opacity:.55}).addTo(MAP);
    if(cur>0) L.polyline(cc.slice(0,cur+1),{color:'#004D99',weight:5,opacity:.85}).addTo(MAP);
    steps.forEach((s,i)=>{
      const done=i<cur,active=i===cur;
      const cls=done?'mk-done':active?'mk-cur':'mk-fut';
      const lbl=done?'✓':String(i+1);
      const aria=done?`Étape ${i+1} terminée`:active?`Étape ${i+1} en cours`:`Étape ${i+1} à venir`;
      const icon=L.divIcon({
        html:`<div class="mk ${cls}" role="img" aria-label="${aria}" style="${active?'background:'+col:''}">${lbl}</div>`,
        className:'',iconSize:[40,40],iconAnchor:[20,20],popupAnchor:[0,-24]});
      const mk=L.marker(s.c,{icon}).addTo(MAP);
      mk.bindPopup(`<b style="font-size:14px">${active?'📍 ':''}${s.nm}</b>`,{maxWidth:200});
      if(active){mk.openPopup();mk.on('click',()=>{if(G.ph==='riddle')set({ph:'question'});});}
    });
    MAP.fitBounds(L.latLngBounds(cc).pad(.12));
    setTimeout(()=>{if(MAP)MAP.setView(cc[cur],16,{animate:true});},400);
  },220);
}

    {nm:'Le Bois Magnier',c:[50.412283,1.578512],vi:{bg:'linear-gradient(135deg,#00464D,#00707A)',em:'🌲',cap:'Bois Magnier'},img:'photos/boismagnier.png',rd:'Termine au Bois Magnier. C\'est un bois en pleine ville. Il a un terrain de Disc Golf. Ce sport se joue avec des disques volants. C\'est amusant et accessible à tous !',q:'Comment gagne-t-on au Disc Golf ?',op:['En lançant le disque le plus loin','En atteignant les paniers avec le moins de lancers','En rattrapant le disque en l\'air'],ok:1,wy:'On lance un disque vers un panier en métal. Celui qui arrive au panier avec le moins de lancers gagne. C\'est comme le golf mais avec un disque. Tout le monde peut jouer !',anec:'🐿️ Le Bois Magnier est aussi un refuge pour les animaux. Des écureuils, des hérissons et des chauves-souris y vivent. De vieux chênes centenaires y poussent encore.'}
  ]},
  {id:4,ic:'waves',col:'#2A3B8F',cd:'#1B2760',cl:'#E3E6F7',nm:'Bord de Mer & Sports',ds:'Plage, char à voile, cerfs-volants et hôpital maritime',acc:'⚠️ Sable, partiellement accessible',dist:'2,6 km',time:'1h11',mission:'Compte le nombre de cerfs-volants ou de chars à voile que tu vois pendant le parcours.',

    {nm:'La sculpture «\u00a0Marianne Toute Seule\u00a0»',c:[50.405322,1.559500],vi:{bg:'linear-gradient(135deg,#2A3B8F,#1B2760)',em:'🗿',cap:'Marianne Toute Seule'},img:'photos/marieannettseule.png',rd:'Sur l\'Esplanade Parmentier, cherche la sculpture «\u00a0Marianne Toute Seule\u00a0». Elle montre 2 femmes et un petit garçon. Elle représente les soignants qui s\'occupent des malades.',q:'Qui a créé cette sculpture en 1892 ?',op:['Auguste Rodin','Marie Cazin-Guillet, belle-sœur du médecin Henri Cazin','Jan Lavezzari, peintre berckois'],ok:1,wy:'Marie Cazin-Guillet était une artiste. Son beau-frère était le docteur Henri Cazin. Elle a créé cette sculpture pour dire merci aux médecins et soignants de Berck.',anec:'🛡️ En 1939, la sculpture a été cachée. Les Allemands prenaient les bronzes pour faire des armes. Après la guerre, la sculpture a été remise à sa place.'},
    {nm:'Départ — Promenade Debeyre',c:[50.403207,1.557451],vi:{bg:'linear-gradient(135deg,#1B2760,#2A3B8F)',em:'🌊',cap:'Promenade Debeyre'},img:'photos/promenadedebeyre.jpg',rd:'Depuis le Centre La Mollière, va jusqu\'à la Promenade Debeyre. Elle longe la mer pendant 1 km. Regarde comme la plage est grande !',q:'Pourquoi la plage de Berck est-elle si grande à marée basse ?',op:['La mer est très peu profonde','La marée descend très bas et découvre des kilomètres de sable','Les vagues déposent beaucoup de sable'],ok:1,wy:'À Berck, la mer monte et descend beaucoup. La différence peut être de 9 mètres ! Quand la mer descend, elle laisse des kilomètres de sable ferme. C\'est parfait pour le char à voile.',anec:'⛑️ Il y a des «\u00a0bâches\u00a0» sur la plage. Ce sont des creux remplis d\'eau cachés sous le sable. Ils sont dangereux. Des sauveteurs protègent les baigneurs depuis 1866.'},
    {nm:'La Grande Plage',c:[50.402847,1.556276],vi:{bg:'linear-gradient(135deg,#2A3B8F,#1B2760)',em:'🏖️',cap:'Grande Plage'},img:'photos/1ere%20photo%20cerfvolant.jpg',rd:'Tu es sur la Grande Plage. En 1891, Émile Wenz a fait quelque chose d\'incroyable ici. Il a attaché un appareil photo à un cerf-volant. Il a pris la première photo du ciel de toute l\'histoire !',q:'En quelle année a été prise la première photo aérienne de l\'histoire, à Berck ?',op:['En 1870','En 1920','En 1891'],ok:2,wy:'En 1891, Émile Wenz a accroché un appareil photo à un cerf-volant. Le cerf-volant est monté en l\'air. L\'appareil a pris une photo de la plage vue du ciel. C\'était une première mondiale !',anec:'🎈 En 1904, Gabriel Voisin testait des planeurs sur les dunes de Berck. Le peintre Jan Lavezzari a aussi sauté des dunes avec un planeur qu\'il avait inventé lui-même.'},
    {nm:'Zone de Char à Voile',c:[50.404000,1.557000],vi:{bg:'linear-gradient(135deg,#1B2760,#2A3B8F)',em:'💨',cap:'Record 151 km/h'},img:'photos/Char%20%C3%A0%20voile%20sur%20la%20plage%20de%20Berck%20sur%20Mer%20-%20C%C3%B4te%20d%27Opale%2C%20dans%20le%20Pas%20de%20calais%20%28France%29.jfif',rd:'Voici la zone de char à voile. Ces véhicules ont 3 roues et une grande voile. Le vent les pousse très vite. Un record du monde a été battu ici en 1991.',q:'Quelle vitesse a atteint Bertrand Lambert à Berck en 1991 ?',op:['98 km/h','151,55 km/h','200 km/h'],ok:1,wy:'En 1991, Bertrand Lambert a roulé à 151,55 km/h sur le sable de Berck. C\'est un record du monde de vitesse sur sable en char à voile. Ce record tient toujours.',anec:'🌍 Le record du monde absolu est de 222,40 km/h. Il a été battu en 2022 par un Néo-Zélandais nommé Glenn Ashby. Mais lui roulait sur une surface dure, pas sur le sable.'},
    {nm:'Le Festival des Cerfs-Volants',c:[50.404500,1.556500],vi:{bg:'linear-gradient(135deg,#2A3B8F,#1B2760)',em:'🎑',cap:'Festival depuis 1987'},img:'photos/Cerf%20volant%20-%20Berck.jfif',rd:'Chaque printemps, le ciel de Berck se remplit de cerfs-volants géants. Il y a des animaux, des personnages, des formes inventées. Ce festival s\'appelle le RICV.',q:'Depuis quelle année Berck organise-t-il ce grand festival de cerfs-volants ?',op:['Depuis 1987','Depuis 1960','Depuis 2005'],ok:0,wy:'Le festival existe depuis 1987. Il s\'appelle les «\u00a0Rencontres Internationales de Cerfs-Volants\u00a0». Plus de 500\u00a0000 personnes viennent le voir chaque année.',anec:'🏁 Depuis 50 ans, une grande course de chars à voile a lieu à Berck. Elle s\'appelle les «\u00a06 heures de Berck\u00a0». Des équipes viennent de toute l\'Europe.'},
    {nm:'L\'Hôpital Maritime',c:[50.400875,1.558061],vi:{bg:'linear-gradient(135deg,#1B2760,#2A3B8F)',em:'🏨',cap:'Hôpital Maritime 1869'},img:'photos/hopitalmaritime.png',rd:'L\'Hôpital Maritime a été ouvert le 18 juillet 1869. L\'Impératrice Eugénie est venue pour l\'inauguration. Au départ, il soignait uniquement des enfants malades des os.',q:'Quel est le premier nom de l\'Hôpital Maritime en 1869 ?',op:['Hôpital de la Côte d\'Opale','Hôpital Napoléon','Hôpital des Sables'],ok:1,wy:'En 1869, l\'hôpital s\'appelait «\u00a0Hôpital Napoléon\u00a0». Après la chute de Napoléon III, il a changé de nom plusieurs fois. En 1961, il a pris le nom «\u00a0Hôpital Maritime de Berck-sur-Mer\u00a0».',anec:'📈 En 1910, l\'hôpital a été agrandi. Il pouvait accueillir 1\u00a0000 malades. C\'est énorme pour l\'époque !'}
  ]},

    {nm:'Le Phare de Berck',c:[50.398378,1.560798],vi:{bg:'linear-gradient(135deg,#5B2090,#3D126B)',em:'🔦',cap:'Phare de Berck'},img:'photos/phare.png',rd:'Le phare actuel a été construit en 1949. Il mesure 40 mètres. Il a des rayures rouges et blanches. Il s\'allume tout seul depuis 1996. C\'est un Monument Historique depuis 2010.',q:'Pourquoi a-t-on construit un phare plus haut en 1868 ?',op:['L\'ancien était trop vieux','Un petit hôpital construit devant lui cachait sa lumière','La mer avait emporté l\'ancien'],ok:1,wy:'En 1861, un petit hôpital a été construit juste devant le phare. Il cachait la lumière. Les bateaux ne voyaient plus bien. Alors on a fait une tour plus haute pour que la lumière passe au-dessus.',anec:'🏠 L\'ancienne maison du gardien est devenue la Maison du Patrimoine. On peut voir comment vivaient les pêcheurs. C\'est gratuit ! Téléphone : 03 21 09 44 04.'},
    {nm:'Le Calvaire des Marins',c:[50.396993,1.556791],vi:{bg:'linear-gradient(135deg,#3D126B,#5B2090)',em:'⛵',cap:'Calvaire des Marins'},img:'photos/Berck_-_Calvaire_des_marins.jfif',rd:'Le Calvaire des Marins est sur la promenade Debeyre. Il mesure 9 mètres de haut. Il a été construit en 1851. Détruit pendant la guerre, la ville l\'a reconstruit en 1999.',q:'En 1907, le Calvaire des Marins a failli être détruit. Qu\'est-ce qui s\'est passé ?',op:['Une tempête a failli l\'emporter','L\'incendie du Grand-Hôtel à côté a failli le brûler','Un bateau l\'a percuté'],ok:1,wy:'En 1907, un grand hôtel à côté a pris feu. Des gens courageux ont sauvé le calvaire. L\'une d\'elles s\'appelait Léonie Duplais. Elle tenait un restaurant pour les pauvres à Berck.',anec:'⛪ À Berck, il y a beaucoup de calvaires et de petites statues dans les rues. Les familles de pêcheurs les avaient mis là pour honorer les pêcheurs morts en mer.'},
    {nm:'Le Monument des Internes',c:[50.396866,1.556683],vi:{bg:'linear-gradient(135deg,#5B2090,#3D126B)',em:'🗿',cap:'Monument des Internes'},img:'photos/monumentdesinternes.png',rd:'Ce monument raconte une histoire triste. En 1907, 2 médecins sont allés chasser des canards dans la Baie d\'Authie. La marée est montée très vite. Ils se sont noyés. Ce monument les honore.',q:'Pourquoi les 2 médecins se sont-ils noyés en 1907 ?',op:['Leur bateau a coulé','La marée est montée très vite par temps de brouillard','Ils ne savaient pas nager'],ok:1,wy:'Les 2 médecins chassaient par temps de brouillard. Ils n\'ont pas vu la marée monter. La mer est revenue très vite. Ils ont été noyés. La marée à Berck peut être très dangereuse.',anec:'🔧 Ce monument a été construit en 1913. Les Allemands l\'ont abîmé pendant la guerre. La ville l\'a reconstruit complètement en 2019.'},
    {nm:'Les Phoques — Baie de l\'Authie',c:[50.394312,1.560500],vi:{bg:'linear-gradient(135deg,#3D126B,#5B2090)',em:'🦭',cap:'Les phoques'},img:'photos/viviane6276-sea-3646424_1920.jpg',rd:'Marche vers le sud jusqu\'à la Baie de l\'Authie. Quand la marée est basse, regarde les bancs de sable. Tu peux voir des phoques allongés au soleil ! Reste à plus de 300 mètres.',q:'Combien d\'espèces de phoques vit-on dans la Baie de l\'Authie ?',op:['2 espèces : le Phoque veau-marin et le Phoque gris','1 seule espèce','4 espèces différentes'],ok:0,wy:'Dans la Baie de l\'Authie, il y a 2 espèces de phoques. Le Phoque veau-marin et le Phoque gris. Il y en a plus de 500. C\'est un endroit rare où les phoques font leurs petits.',anec:'🦅 La Baie de l\'Authie accueille aussi plus de 250 espèces d\'oiseaux. Chaque automne, des milliers d\'oiseaux s\'y arrêtent pour se reposer. C\'est une zone naturelle protégée.'}

/* ============================================================  ÉTAT  */
let G={sc:'welcome',rt:null,st:0,ph:'riddle',ch:null,sc2:0,ans:[],navOpen:false};
function set(p){killMap();Object.assign(G,p);render();}

/* ============================================================  RENDU  */
function render(){
  const app=document.getElementById('app');
  if(G.sc==='welcome') rWelcome(app);
  else if(G.sc==='routes') rRoutes(app);
  else if(G.sc==='game')   rGame(app);
  else if(G.sc==='end')    rEnd(app);
}

/* ── ACCUEIL ── */

/* ── JEU ── */
function rGame(app){
  const rt=G.rt,step=rt.steps[G.st],tot=rt.steps.length;
  spk=`Étape ${G.st+1} sur ${tot} : ${step.nm}. ${step.rd}`;
  const pct=Math.round(((G.st+(G.ph==='feedback'?1:0))/tot)*100);

  const dots=rt.steps.map((_,i)=>{
    const c=i<G.st?'dot-done':i===G.st?'dot-cur':'dot-fut';
    const l=i<G.st?'terminée':i===G.st?'en cours':'à venir';
    return`<div class="dot ${c}" role="img" aria-label="Étape ${i+1} ${l}"></div>`;
  }).join('');

  const visual=`
<div class="stepimg" style="background:${step.vi.bg}" role="img" aria-label="${step.nm}">
  <img src="${step.img}" alt="${step.nm}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
  <div class="stepimg__fb" aria-hidden="true">
    <span class="stepimg__em">${EMOJI_TO_ICON[step.vi.em]?ic(EMOJI_TO_ICON[step.vi.em],48):step.vi.em}</span>

  <div class="hint" role="note" style="background:${rt.cl};border-color:${rt.col};color:${rt.cd}">

    if(nav){

      navModalHtml=`
<div id="navmodal-slot" class="modal-ov" style="display:none" role="dialog" aria-modal="true" aria-label="Itinéraire détaillé" onclick="if(event.target===this)closeNavModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeNavModal()" aria-label="Fermer">✕</button>

      <span class="modal-row__ic" aria-hidden="true">${ic('pin',20)}</span>
      <div><div class="modal-row__lbl">Vous partez de</div>

    </div>
    <div class="modal-row">
      <span class="modal-row__ic" aria-hidden="true">${ic('flagCheck',20)}</span>

    <a class="modal-maps" href="${gurl}" target="_blank" rel="noopener">
      <span aria-hidden="true">${ic('map',18)}</span> Ouvrir l'itinéraire à pied dans Google Maps

    }
  }
  else if(G.ph==='question'){

    const opts=step.op.map((o,i)=>`

      <div class="scbadge" aria-label="Score : ${G.sc2} bonne${G.sc2>1?'s':''} réponse${G.sc2>1?'s':''} sur ${G.st}">

    </div>
    <div class="prog" role="progressbar"
         aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100"

      <div class="prog__row">
        <span style="font-weight:900;color:${rt.cd}">${rt.nm}</span>

    ${panel}
  </div>
  ${navModalHtml}

    <span aria-hidden="true">${ic('refresh',18)}</span> Recommencer
  </button>
  <button class="btn btn-sec"
          onclick="set({sc:'routes'})"
          aria-label="Choisir un autre parcours">
    <span aria-hidden="true">${ic('map',18)}</span> Autre parcours
  </button>
</div>
<button class="btn btn-ghost" style="width:100%;display:flex;justify-content:center"
        onclick="set({sc:'welcome'})" aria-label="Retour à l'accueil">
  <span aria-hidden="true" style="display:inline-flex;vertical-align:-4px;margin-right:.35rem">${ic('home',18)}</span>Accueil
</button>

</div>`;
}

/* ============================================================  ACTIONS  */
function ansQ(i){
  if(G.ch!==null)return;
  const ok=i===G.rt.steps[G.st].ok;
  set({ch:i,sc2:G.sc2+(ok?1:0),ans:[...G.ans,ok],ph:'feedback'});
}
function nx(){
  if(G.st<G.rt.steps.length-1) set({st:G.st+1,ph:'riddle',ch:null});
  else set({sc:'end'});
}

render();
</script>
